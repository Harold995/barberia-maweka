<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>El Maweka – Barbería</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c9a84c;--gold2:#a8843c;--bg:#0d0b08;--bg2:#111009;--bg3:#1a1510;--bg4:#252015;--border:#252015;--text:#e8d5a3;--muted:#666;--red:#e74c3c;--green:#27ae60;--orange:#e67e22}
body{background:var(--bg);font-family:'Lato',sans-serif;color:var(--text);min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.fadeIn{animation:fadeIn .3s ease forwards}
.pop{animation:pop .28s ease forwards}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
input[type=date]::-webkit-calendar-picker-indicator,input[type=time]::-webkit-calendar-picker-indicator{filter:invert(.55)}

/* ── HEADER ── */
header{background:linear-gradient(160deg,#0f0d0a,#1c1710);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:300;box-shadow:0 4px 24px #00000077}
.hdr{max-width:1000px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:66px;gap:12px}
.logo{display:flex;align-items:center;gap:11px;text-decoration:none;flex-shrink:0}
.logo-icon{font-size:30px;line-height:1}
.logo-name{font-family:'Playfair Display',serif;font-size:19px;color:var(--gold);letter-spacing:3px;display:block}
.logo-sub{font-size:9px;color:#7a6844;letter-spacing:4px;text-transform:uppercase;display:block;margin-top:-2px}
.hdr-right{display:flex;align-items:center;gap:8px}
.nbtn{background:transparent;border:1px solid #3a2e1e;color:var(--muted);padding:7px 14px;border-radius:5px;cursor:pointer;font-size:12px;letter-spacing:1px;font-family:'Lato',sans-serif;transition:all .2s;white-space:nowrap}
.nbtn:hover{border-color:var(--gold);color:var(--gold)}
.nbtn.on{background:var(--gold);border-color:var(--gold);color:#0d0b08;font-weight:700}
.nbtn.logout{border-color:#3a2218;color:#774433}
.nbtn.logout:hover{border-color:var(--red);color:var(--red)}

/* ── LAYOUT ── */
main{max-width:1000px;margin:0 auto;padding:36px 20px;min-height:calc(100vh - 106px)}
footer{text-align:center;padding:16px;border-top:1px solid #1a1510;color:#383838;font-size:11px;letter-spacing:2px}

/* ── LOADING OVERLAY ── */
#loading-overlay{position:fixed;inset:0;background:#0d0b08ee;z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#loading-overlay.show{display:flex}
.spinner{width:38px;height:38px;border:3px solid var(--bg4);border-top:3px solid var(--gold);border-radius:50%;animation:spin 1s linear infinite}
.loading-text{color:var(--gold);font-family:'Playfair Display',serif;font-size:15px}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1c1a11;border:1px solid var(--gold);color:var(--text);padding:11px 22px;border-radius:8px;font-size:13px;z-index:600;opacity:0;pointer-events:none;transition:opacity .3s;max-width:340px;text-align:center;box-shadow:0 4px 20px #00000088}
#toast.show{opacity:1}
#toast.err{border-color:var(--red);background:#1c0e0e}

/* ── SETUP SCREEN ── */
.setup-wrap{display:flex;justify-content:center;align-items:center;min-height:60vh}
.setup-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:500px;display:flex;flex-direction:column;gap:16px}
.setup-card h2{font-family:'Playfair Display',serif;color:var(--gold);text-align:center;font-size:22px}
.setup-steps{background:#0d0b08;border:1px solid #1a1510;border-radius:8px;padding:16px;font-size:13px;line-height:1.9;color:var(--muted)}
.setup-steps b{color:var(--text)}
.setup-steps code{background:#1a1510;padding:2px 6px;border-radius:4px;color:var(--gold);font-family:monospace;font-size:12px}

/* ── STEP BAR ── */
.steps{display:flex;justify-content:center;margin-bottom:28px}
.step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;max-width:110px}
.step-n{width:30px;height:30px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--gold);transition:all .3s}
.step-n.act,.step-n.done{background:var(--gold);color:#0d0b08}
.step-l{font-size:10px;letter-spacing:1px;color:#444;text-transform:uppercase;transition:color .3s}
.step.act .step-l{color:var(--gold)}.step.done .step-l{color:#7a6844}

/* ── CARD ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:30px;max-width:680px;margin:0 auto}
.ct{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);margin-bottom:20px;font-weight:700}
.back{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:13px;margin-bottom:14px;padding:0;font-family:'Lato',sans-serif;transition:color .2s;display:block}
.back:hover{color:var(--gold)}

/* ── CALENDAR ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-arr{background:var(--bg3);border:1px solid var(--border);color:var(--gold);width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit}
.cal-arr:hover{background:var(--bg4)}
.cal-lbl{font-family:'Playfair Display',serif;font-size:17px;color:var(--text);text-transform:capitalize}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.ch{text-align:center;font-size:10px;color:#444;padding:5px 0;font-weight:700;letter-spacing:1px}
.cd{text-align:center;padding:9px 3px;border-radius:7px;font-size:13px;font-weight:700;cursor:default;position:relative;min-height:36px;display:flex;align-items:center;justify-content:center;transition:all .14s;flex-direction:column}
.cd.av{color:var(--text);border:1px solid var(--border);background:var(--bg3);cursor:pointer}
.cd.av:hover{background:var(--bg4);border-color:var(--gold);transform:scale(1.06)}
.cd.sel{background:var(--gold);color:#0d0b08;border:1px solid var(--gold)}
.cd.off{color:#252015;border:1px solid #0f0d0a}
.cd.cl::after{content:'🔒';font-size:8px;position:absolute;bottom:2px;right:2px}
.cal-leg{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:12px;color:#444}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px;vertical-align:middle}

/* ── SLOTS ── */
.barber-row{margin-bottom:14px}
.barber-btns{display:flex;gap:7px;margin-top:7px;flex-wrap:wrap}
.bb{background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:5px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-family:'Lato',sans-serif;transition:all .2s}
.bb:hover{border-color:var(--gold);color:var(--gold)}
.bb.on{background:var(--gold);border-color:var(--gold);color:#0d0b08;font-weight:700}
.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:7px;margin-top:4px}
.sl{padding:11px 5px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;transition:all .14s;font-family:'Lato',sans-serif;line-height:1.3}
.sl:hover:not([disabled]){background:var(--bg4);border-color:var(--gold);transform:translateY(-2px)}
.sl[disabled]{background:#0c0b08;border-color:#111;color:#252015;cursor:default}
.sl .occ{display:block;font-size:10px;font-weight:600;letter-spacing:.3px}

/* ── SERVICIOS (cliente) ── */
.svs{display:flex;flex-direction:column;gap:9px}
.svi{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 18px;cursor:pointer;transition:all .2s}
.svi:hover,.svi.on{border-color:var(--gold);background:#1c1a11;transform:translateX(3px)}
.sv-name{font-weight:700;color:var(--text);font-size:15px}
.sv-meta{color:var(--muted);font-size:12px;margin-top:3px}
.sv-price{color:var(--gold);font-weight:700}

/* ── FORM ── */
.sumbox{background:#0d0b08;border:1px solid #1a1510;border-radius:8px;padding:13px;margin-bottom:18px}
.srow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #111;font-size:13px}
.srow:last-child{border:none}
.slb{color:var(--muted)}
.svl{color:var(--text);font-weight:600;text-transform:capitalize;text-align:right;max-width:60%}
.fform{display:flex;flex-direction:column;gap:11px;margin-bottom:18px}

/* ── INPUTS ── */
input,textarea,select{
  background:var(--bg3);border:1px solid var(--border);color:var(--text);
  padding:10px 13px;border-radius:8px;font-size:14px;outline:none;
  width:100%;font-family:'Lato',sans-serif;transition:border-color .2s;
  -webkit-appearance:none;appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--gold)}
input::placeholder,textarea::placeholder{color:#3a3020}
input[type=password]{letter-spacing:2px}
input[type=password]::placeholder{letter-spacing:normal}
textarea{resize:vertical;height:76px}
select option{background:var(--bg3);color:var(--text)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

/* ── BUTTONS ── */
.btn{background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;color:#0d0b08;
  padding:12px 24px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;
  width:100%;letter-spacing:1px;font-family:'Lato',sans-serif;transition:opacity .2s}
.btn:hover:not([disabled]){opacity:.87}
.btn[disabled]{opacity:.38;cursor:default}
.btn-sm{background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;color:#0d0b08;
  padding:8px 16px;border-radius:7px;font-weight:700;cursor:pointer;font-size:12px;
  font-family:'Lato',sans-serif;white-space:nowrap;transition:opacity .2s;letter-spacing:.5px}
.btn-sm:hover:not([disabled]){opacity:.87}
.btn-sm[disabled]{opacity:.38;cursor:default}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);
  padding:7px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-family:'Lato',sans-serif;transition:all .2s}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-red{background:transparent;border:1px solid #3a1818;color:#774444;padding:6px 12px;
  border-radius:7px;cursor:pointer;font-size:12px;font-family:'Lato',sans-serif;transition:all .2s;white-space:nowrap}
.btn-red:hover{border-color:var(--red);color:var(--red);background:#1c0808}
.btn-green{background:transparent;border:1px solid #183a1e;color:#447744;padding:6px 12px;
  border-radius:7px;cursor:pointer;font-size:12px;font-family:'Lato',sans-serif;transition:all .2s;white-space:nowrap}
.btn-green:hover{border-color:var(--green);color:var(--green);background:#081c0c}
.btn-orange{background:transparent;border:1px solid #3a2a10;color:#776633;padding:6px 12px;
  border-radius:7px;cursor:pointer;font-size:12px;font-family:'Lato',sans-serif;transition:all .2s;white-space:nowrap}
.btn-orange:hover{border-color:var(--orange);color:var(--orange);background:#1c1208}

/* ── CONFIRM (paso 5) ── */
.conf{max-width:500px;margin:0 auto;background:var(--bg2);border:1px solid var(--gold);
  border-radius:16px;padding:38px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
.conf-t{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);margin:0}

/* ── ADMIN ── */
.login-wrap{display:flex;justify-content:center;align-items:center;min-height:60vh}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px;
  width:100%;max-width:370px;display:flex;flex-direction:column;gap:13px;text-align:center}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);flex-wrap:wrap;overflow-x:auto}
.tab{background:transparent;border:none;border-bottom:3px solid transparent;color:#444;
  padding:10px 14px;cursor:pointer;font-size:12px;font-weight:600;letter-spacing:.5px;
  transition:all .2s;font-family:'Lato',sans-serif;margin-bottom:-1px;white-space:nowrap}
.tab:hover{color:var(--gold)}
.tab.on{color:var(--gold);border-bottom:3px solid var(--gold)}
.tcontent{background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 14px 14px;padding:26px}
.sec-t{font-family:'Playfair Display',serif;font-size:19px;color:var(--gold);margin-bottom:18px;font-weight:700}

/* ── STATUS BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.badge-pend{background:#2a1e08;color:#c9843c;border:1px solid #3a2e10}
.badge-asist{background:#0a1e0e;color:#4aaa64;border:1px solid #1a3a22}
.badge-noasist{background:#1e0a0a;color:#aa4444;border:1px solid #3a1a1a}
.badge-cancel{background:#1a1a1a;color:#666;border:1px solid #333}
.badge-elim{display:none}

/* ── CITAS TAB ── */
.apt-card{display:flex;gap:12px;background:#0d0b08;border:1px solid #1c1a11;border-radius:10px;padding:13px;align-items:flex-start;transition:border .2s}
.apt-card:hover{border-color:var(--border)}
.apt-date{text-align:center;min-width:48px}
.apt-d{color:var(--gold);font-weight:700;font-size:11px;text-transform:capitalize;line-height:1.2}
.apt-t{color:var(--text);font-weight:700;font-size:17px;font-family:'Playfair Display',serif}
.apt-info{flex:1;min-width:0}
.apt-name{color:var(--text);font-weight:700;font-size:14px}
.apt-meta{color:var(--muted);font-size:12px;margin-top:2px}
.apt-extra{color:#444;font-size:12px;margin-top:2px}
.apt-actions{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.fbtn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-family:'Lato',sans-serif;transition:all .2s}
.fbtn:hover{border-color:var(--gold);color:var(--gold)}
.fbtn.on{background:var(--gold);border-color:var(--gold);color:#0d0b08;font-weight:700}

/* ── SERVICIOS ADMIN ── */
.svc-admin-card{background:#0d0b08;border:1px solid #1c1a11;border-radius:10px;padding:14px 16px}
.svc-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.svc-name-big{font-weight:700;color:var(--text);font-size:15px;flex:1;min-width:120px}
.svc-info{color:var(--muted);font-size:13px;display:flex;gap:10px;flex-wrap:wrap}
.edit-form{background:#0d0b08;border:1px solid var(--gold);border-radius:8px;padding:14px;margin-top:10px;display:flex;flex-direction:column;gap:9px}
.edit-form .row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.edit-form .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}

/* ── HORARIOS ── */
.drow{display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px solid #1a1510;flex-wrap:wrap}
.dtog{display:flex;align-items:center;gap:10px;min-width:148px}
.ttrack{width:42px;height:23px;border-radius:12px;position:relative;background:var(--bg4);cursor:pointer;transition:background .25s;flex-shrink:0}
.ttrack.on{background:var(--gold)}
.tthumb{position:absolute;top:2px;left:2px;width:19px;height:19px;background:#fff;border-radius:50%;transition:left .25s;pointer-events:none}
.ttrack.on .tthumb{left:21px}
.dname{font-weight:600;width:88px;transition:color .25s;font-size:13px}
.dcfg{flex:1;display:flex;flex-direction:column;gap:5px}
.trow{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
input[type=time]{width:auto;padding:5px 9px;font-size:12px}
.add-brk{background:transparent;border:1px dashed var(--border);color:#444;padding:3px 11px;
  border-radius:6px;cursor:pointer;font-size:11px;font-family:'Lato',sans-serif;transition:all .2s;white-space:nowrap}
.add-brk:hover{border-color:var(--gold);color:var(--gold)}
.rm{background:var(--bg3);border:1px solid var(--border);color:var(--red);width:22px;height:22px;border-radius:50%;
  cursor:pointer;font-size:10px;display:inline-flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;font-family:inherit}
.rm:hover{background:#1c0000}

/* ── FESTIVOS ── */
.cl-row{display:flex;align-items:center;gap:10px;background:#0d0b08;border:1px solid #1c1a11;border-radius:8px;padding:11px 14px;flex-wrap:wrap}
.cl-date{color:var(--gold);font-weight:700;font-size:13px;text-transform:capitalize;flex:1}
.cl-lbl{color:var(--muted);font-size:12px}

/* ── BARBEROS ADMIN ── */
.bar-row{display:flex;align-items:center;gap:12px;background:#0d0b08;border:1px solid #1c1a11;border-radius:10px;padding:13px 16px}
.bar-name{color:var(--text);font-weight:700;flex:1;font-size:15px}

/* ── UTILS ── */
.lbl{color:#777;font-size:12px;margin-bottom:3px;display:block}
.err-msg{color:var(--red);font-size:13px;text-align:center;padding:5px}
.empty{color:#333;text-align:center;padding:32px;font-size:14px;font-style:italic}
.flex{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.col{display:flex;flex-direction:column;gap:7px}
.ml{margin-left:auto}
.mt{margin-top:20px}
.slim{width:auto;padding:6px 9px;font-size:13px}
.sep{border:none;border-top:1px solid #1a1510;margin:6px 0}
.notice{background:#1a1510;border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--muted);font-size:13px;line-height:1.6}
.notice b{color:var(--text)}

@media(max-width:540px){
  .hdr{height:auto;padding:10px 14px;flex-wrap:wrap;gap:8px}
  .hdr-right{flex-wrap:wrap}
  .card,.tcontent{padding:16px}
  .tab{font-size:11px;padding:8px 10px}
  .edit-form .row3{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <span class="loading-text">Cargando…</span>
</div>
<div id="toast"></div>

<header>
  <div class="hdr">
    <div class="logo">
      <span class="logo-icon">💈</span>
      <div>
        <span class="logo-name">EL MAWEKA</span>
        <span class="logo-sub">Barbería de Élite</span>
      </div>
    </div>
    <div class="hdr-right" id="hdr-right">
      <button class="nbtn on"  id="v-client" onclick="setView('client')">Reservar Cita</button>
      <button class="nbtn"     id="v-admin"  onclick="setView('admin')">Panel Barbero</button>
    </div>
  </div>
</header>

<main id="app"></main>

<footer>© 2026 El Maweka — Todos los derechos reservados</footer>

<script>
"use strict";
// ══════════════════════════════════════════════
//  CONSTANTES
// ══════════════════════════════════════════════
const DAYS   = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const LS_URL = "maweka_api_url_v1";

// ══════════════════════════════════════════════════════════════
//  ▼▼▼  PON AQUÍ TU URL DE APPS SCRIPT (opcional)  ▼▼▼
//  Si la dejas vacía ("") la app te la pedirá la primera vez
//  y la recordará automáticamente en el navegador.
// ══════════════════════════════════════════════════════════════
const HARDCODED_URL = "https://script.google.com/macros/s/AKfycbzUlscTh2ymVd_-ga8WhN1iY9pEr1u3e1Lz61oLpwbjK8qR9g2e0N3NEbBmiAzo8q9kPA/exec";   

// ══════════════════════════════════════════════
//  ESTADO GLOBAL
// ══════════════════════════════════════════════
let SCRIPT_URL = HARDCODED_URL || localStorage.getItem(LS_URL) || "";
let DB = {appointments:[], services:[], barbers:[], config:{slotDuration:30,schedule:{},closedDates:[],closedLabels:{},currency:"€"}};
let VIEW  = "client";
let ADMIN_OK  = false;
let ATAB  = "citas";
let CITAS_FILTER = "proximas";
let SCHED_DRAFT  = null;

let WZ = mkWZ();

//  API
// ══════════════════════════════════════════════
async function api(action, payload={}) {
  if (!SCRIPT_URL) throw new Error("URL no configurada");
  const url = SCRIPT_URL + "?action=" + action
    + (Object.keys(payload).length ? "&payload=" + encodeURIComponent(JSON.stringify(payload)) : "");
  const res = await fetch(url);
  if (!res.ok) throw new Error("HTTP " + res.status);
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || "Error desconocido");
  return json.data;
}

async function loadAll() {
  showLoading();
  try {
    DB = await api("getAll");
    if (!DB.config.closedLabels) DB.config.closedLabels = {};
  } finally {
    hideLoading();
  }
}

async function act(action, payload, successMsg) {
  showLoading();
  try {
    await api(action, payload);
    await loadAll();
    if (successMsg) toast(successMsg);
  } catch(e) {
    toast("Error: " + e.message, true);
  } finally {
    hideLoading();
    render();
  }
}

function showLoading(){ document.getElementById("loading-overlay").classList.add("show"); }
function hideLoading(){ document.getElementById("loading-overlay").classList.remove("show"); }

let _toastTimer;
function toast(msg, isErr=false){
  const t=document.getElementById("toast");
  t.textContent=msg; t.className="show"+(isErr?" err":"");
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{t.className="";},3000);
}

function mk(tag,cls,inner){
  const e=document.createElement(tag);
  if(cls)   e.className=cls;
  if(inner!==undefined) e.innerHTML=inner;
  return e;
}

function srow(l,v){return `<div class="srow"><span class="slb">${l}</span><span class="svl">${v||""}</span></div>`;}

function todayISO(){return new Date().toISOString().slice(0,10);}
function dkey(y,m,d){return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");}
function toMin(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function frMin(n){return String(Math.floor(n/60)).padStart(2,"0")+":"+String(n%60).padStart(2,"0");}

// Normaliza cualquier formato de fecha a "YYYY-MM-DD"
// Google Sheets puede devolver "15/01/2025" o "2025/01/15" en lugar de ISO
function normDate(ds){
  if(!ds) return "";
  const s=String(ds).trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);          // ya ISO
  const dmy=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(dmy) return dmy[3]+"-"+dmy[2].padStart(2,"0")+"-"+dmy[1].padStart(2,"0");
  const ymd=s.match(/^(\d{4})\/(\d{2})\/(\d{2})/);
  if(ymd) return ymd[1]+"-"+ymd[2]+"-"+ymd[3];
  return s.slice(0,10);
}

function fmtDate(ds,opts){
  const iso=normDate(ds);
  if(!iso||iso.length<10) return ds||"";
  const d=new Date(iso+"T12:00:00");           // T12:00 evita desfase de zona horaria
  if(isNaN(d.getTime())) return iso;
  return d.toLocaleDateString("es-ES",opts||{weekday:"long",day:"numeric",month:"long"});
}

function isPast(dateStr,timeStr){
  const iso=normDate(dateStr);
  if(!iso) return false;
  return new Date(iso+"T"+(timeStr||"00:00")+":00")<new Date();
}

function statusBadge(st){
  const map={
    pendiente:  ["badge badge-pend",   "⏳ Pendiente"],
    asistio:    ["badge badge-asist",  "✓ Asistió"],
    no_asistio: ["badge badge-noasist","✗ No asistió"],
    cancelada:  ["badge badge-cancel", "Cancelada"],
  };
  const [cls,lbl]=map[st]||["badge badge-cancel",st];
  return `<span class="${cls}">${lbl}</span>`;
}

// ══════════════════════════════════════════════
//  SLOTS
// ══════════════════════════════════════════════
function getSlots(dateStr){
  const iso=normDate(dateStr);
  const dow=new Date(iso+"T12:00:00").getDay();
  const dc=DB.config.schedule[String(dow)]||DB.config.schedule[dow];
  if(!dc||!dc.open) return [];
  if((DB.config.closedDates||[]).map(normDate).includes(iso)) return [];
  const len=DB.config.slotDuration, st=toMin(dc.start), en=toMin(dc.end);
  const out=[];
  for(let t=st;t+len<=en;t+=len){
    if(dc.breaks.some(b=>t>=toMin(b.start)&&t<toMin(b.end))) continue;
    const ts=frMin(t);
    const books=DB.appointments.filter(a=>
      normDate(a.date)===iso && a.time===ts &&
      a.status!=="cancelada" && a.status!=="eliminada"
    );
    out.push({time:ts,books,full:books.length>=DB.barbers.length});
  }
  return out;
}

function isDayOk(y,m,d){
  const dk=dkey(y,m,d);
  if(dk<todayISO()) return false;
  if(!DB.barbers.length||!DB.services.length) return false;
  return getSlots(dk).some(s=>!s.full);
}

function updateLogoutBtn(){
  const right=document.getElementById("hdr-right");
  const existing=document.getElementById("logout-btn");
  if(ADMIN_OK&&VIEW==="admin"){
    if(!existing){
      const lb=mk("button","nbtn logout","⏏ Salir");
      lb.id="logout-btn";
      lb.onclick=()=>{ADMIN_OK=false;SCHED_DRAFT=null;render();updateLogoutBtn();};
      right.appendChild(lb);
    }
  } else {
    if(existing) existing.remove();
  }
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  if(!SCRIPT_URL){renderSetup(app);return;}
  VIEW==="client"?renderClient(app):renderAdmin(app);
}

  <h2>Configuración Inicial</h2>
  <p style="color:var(--muted);font-size:13px;text-align:center">Necesitas configurar la URL de tu Google Apps Script para que la app funcione.</p>`;

  steps.innerHTML=`
    <b>Pasos para configurar:</b><br>
    1. Ve a <code>script.google.com</code> y crea un nuevo proyecto<br>
    2. Pega el contenido del archivo <code>Code.gs</code> que se descargó<br>
    3. Ejecuta la función <code>setupSheets()</code> (solo una vez)<br>
    4. Ve a <b>Implementar → Nueva implementación → Aplicación web</b><br>
    5. Ejecutar como: <b>Yo</b> · Acceso: <b>Cualquier persona</b><br>
    6. Copia la URL y pégala abajo`;
  card.appendChild(steps);

  const urlI=document.createElement("input");
  urlI.type="url"; urlI.placeholder="https://script.google.com/macros/s/...../exec";
  urlI.style.fontFamily="monospace"; urlI.style.fontSize="12px";
  card.appendChild(urlI);

  const errEl=mk("p","err-msg",""); errEl.style.display="none";
  card.appendChild(errEl);

  const saveBtn=mk("button","btn","Conectar y comenzar");
  saveBtn.onclick=async()=>{

    if(!url.includes("script.google.com")){errEl.textContent="La URL no parece válida";errEl.style.display="block";return;}

function renderClient(app){
  if(!WZ.barber&&DB.barbers.length) WZ.barber=DB.barbers[0].id;
  const bar=mk("div","steps");
  ["Fecha","Hora","Servicio","Datos"].forEach((l,i)=>{
    const it=mk("div","step"+(WZ.step===i+1?" act":WZ.step>i+1?" done":""));
    it.appendChild(mk("div","step-n"+(WZ.step===i+1?" act":WZ.step>i+1?" done":""),WZ.step>i+1?"✓":String(i+1)));
    it.appendChild(mk("span","step-l",l));
    bar.appendChild(it);
  });
  app.appendChild(bar);
  if(WZ.step===5){stepConfirm(app);return;}
  const card=mk("div","card fadeIn");
  app.appendChild(card);

  // Sin barberos o servicios → aviso
  if(!DB.barbers.length||!DB.services.length){
    card.appendChild(mk("h2","ct","Reservar Cita"));
    card.appendChild(mk("div","notice",
      "<b>La barbería aún no está configurada.</b><br>El administrador debe añadir barberos y servicios antes de poder reservar."));
    return;
  }

  if(WZ.step===1) stepCal(card);
  if(WZ.step===2) stepSlots(card);
  if(WZ.step===3) stepSvc(card);
  if(WZ.step===4) stepForm(card);
}

function stepCal(card){
  card.appendChild(mk("h2","ct","Selecciona una Fecha"));
  const nav=mk("div","cal-nav");
  const prev=mk("button","cal-arr","‹");
  const next=mk("button","cal-arr","›");
  const lbl=mk("span","cal-lbl",MONTHS[WZ.cm]+" "+WZ.cy);
  prev.onclick=()=>{const d=new Date(WZ.cy,WZ.cm-1,1);WZ.cy=d.getFullYear();WZ.cm=d.getMonth();render();};
  next.onclick=()=>{const d=new Date(WZ.cy,WZ.cm+1,1);WZ.cy=d.getFullYear();WZ.cm=d.getMonth();render();};
  nav.appendChild(prev);nav.appendChild(lbl);nav.appendChild(next);
  card.appendChild(nav);

  const grid=mk("div","cal-grid");
  DAYS.forEach(d=>grid.appendChild(mk("div","ch",d.slice(0,3))));
  const first=new Date(WZ.cy,WZ.cm,1).getDay();
  const total=new Date(WZ.cy,WZ.cm+1,0).getDate();
  for(let i=0;i<first;i++) grid.appendChild(mk("div",""));
  for(let d=1;d<=total;d++){
    const dk=dkey(WZ.cy,WZ.cm,d);
    const ok=isDayOk(WZ.cy,WZ.cm,d);
    const sel=dk===WZ.date;
    const cl=(DB.config.closedDates||[]).includes(dk);
    const el=mk("div","cd "+(sel?"sel":ok?"av":"off")+(cl?" cl":""),String(d));
    if(ok) el.onclick=()=>{WZ.date=dk;WZ.slot=null;WZ.step=2;render();};
    grid.appendChild(el);
  }
  card.appendChild(grid);
  const leg=mk("div","cal-leg");
  leg.innerHTML=`<span class="dot" style="background:var(--gold)"></span>Disponible&nbsp;&nbsp;<span class="dot" style="background:var(--bg3);border:1px solid var(--border)"></span>No disponible`;
  card.appendChild(leg);
}

function stepSlots(card){
  const back=mk("button","back","← Volver");back.onclick=()=>{WZ.step=1;render();};
  card.appendChild(back);
  card.appendChild(mk("h2","ct","Selecciona una Hora"));
  card.appendChild(mk("p","",`<span style="color:var(--muted);font-size:13px;text-transform:capitalize">${fmtDate(WZ.date)}</span>`));

  if(DB.barbers.length>1){
    const br=mk("div","barber-row");
    br.appendChild(mk("label","lbl","Barbero:"));
    const btns=mk("div","barber-btns");
    DB.barbers.forEach(b=>{
      const btn=mk("button","bb"+(WZ.barber===b.id?" on":""),b.name);
      btn.onclick=()=>{WZ.barber=b.id;card.innerHTML="";stepSlots(card);};
      btns.appendChild(btn);
    });
    br.appendChild(btns);card.appendChild(br);
  }

  const slots=getSlots(WZ.date);
  const grid=mk("div","slots");
  if(!slots.length) grid.appendChild(mk("p","empty","No hay huecos disponibles este día"));
  slots.forEach(s=>{
    const barberName=DB.barbers.find(b=>b.id===WZ.barber)?.name;
    const barberFull=barberName&&s.books.some(b=>b.barber===barberName);
    const dis=s.full||barberFull;
    // Slot libre: muestra la hora y "Libre" en verde
    // Slot ocupado: hora tachada + "Ocupado" y deshabilitado
    const btn=mk("button","sl"+(dis?" sl-dis":""),s.time);
    const subLbl=mk("span","occ",dis?"Ocupado":"Libre");
    subLbl.style.color=dis?"#3a2a2a":"#3a7a4a";
    btn.appendChild(subLbl);
    if(dis) btn.setAttribute("disabled","");
    else btn.onclick=()=>{WZ.slot=s.time;WZ.step=3;render();};
    grid.appendChild(btn);
  });
  card.appendChild(grid);
}

function stepSvc(card){
  const back=mk("button","back","← Volver");back.onclick=()=>{WZ.step=2;render();};
  card.appendChild(back);
  card.appendChild(mk("h2","ct","Elige tu Servicio"));
  const list=mk("div","svs");
  DB.services.forEach(sv=>{
    const it=mk("div","svi"+(WZ.svc===sv.id?" on":""));
    it.innerHTML=`<div class="sv-name">${sv.name}</div><div class="sv-meta">${sv.duration} min &nbsp;·&nbsp; <span class="sv-price">${sv.price}${sv.currency}</span></div>`;
    it.onclick=()=>{WZ.svc=sv.id;WZ.step=4;render();};
    list.appendChild(it);
  });
  card.appendChild(list);
}

function stepForm(card){
  const sv=DB.services.find(s=>s.id===WZ.svc);
  const barberName=DB.barbers.find(b=>b.id===WZ.barber)?.name||"";
  const back=mk("button","back","← Volver");back.onclick=()=>{WZ.step=3;render();};
  card.appendChild(back);
  card.appendChild(mk("h2","ct","Tus Datos"));

  const sum=mk("div","sumbox");
  sum.innerHTML=[
    srow("Fecha",fmtDate(WZ.date)),srow("Hora",WZ.slot),
    srow("Servicio",sv?.name),srow("Barbero",barberName)
  ].join("");
  card.appendChild(sum);

  const form=mk("div","fform");
  const nameI=document.createElement("input");nameI.type="text";nameI.placeholder="Nombre completo *";nameI.value=WZ.name;nameI.autocomplete="name";
  const phoneI=document.createElement("input");phoneI.type="tel";phoneI.placeholder="Teléfono (solo números)";phoneI.value=WZ.phone;phoneI.inputMode="numeric";
  phoneI.addEventListener("input",()=>{phoneI.value=phoneI.value.replace(/\D/g,"");WZ.phone=phoneI.value;});
  const notesI=document.createElement("textarea");notesI.placeholder="Notas adicionales (opcional)";notesI.value=WZ.notes;
  form.appendChild(nameI);form.appendChild(phoneI);form.appendChild(notesI);
  card.appendChild(form);

  const confBtn=mk("button","btn","Confirmar Cita ✓");
  function evalBtn(){confBtn.disabled=!nameI.value.trim();}
  nameI.addEventListener("input",()=>{WZ.name=nameI.value;evalBtn();});
  notesI.addEventListener("input",()=>{WZ.notes=notesI.value;});
  evalBtn();

  confBtn.onclick=async()=>{
    WZ.name=nameI.value.trim();WZ.phone=phoneI.value.trim();WZ.notes=notesI.value.trim();
    if(!WZ.name) return;
    showLoading();
    try{
      await api("addAppointment",{
        date:WZ.date,time:WZ.slot,barber:barberName,
        svcId:WZ.svc,name:WZ.name,phone:WZ.phone,notes:WZ.notes
      });
      await loadAll();
      WZ.step=5;render();
    }catch(e){toast("Error al guardar: "+e.message,true);}
    finally{hideLoading();}
  };
  card.appendChild(confBtn);
}

function stepConfirm(app){
  const sv=DB.services.find(s=>s.id===WZ.svc);
  const barberName=DB.barbers.find(b=>b.id===WZ.barber)?.name||"";
  const box=mk("div","conf pop");
  const rows=[
    srow("Nombre",WZ.name),
    srow("Fecha",fmtDate(WZ.date,{weekday:"long",day:"numeric",month:"long",year:"numeric"})),
    srow("Hora",WZ.slot),
    srow("Servicio",sv?.name),
    srow("Barbero",barberName),
    ...(WZ.phone?[srow("Teléfono",WZ.phone)]:[] )
  ].join("");
  box.innerHTML=`<div style="font-size:58px">✅</div><h2 class="conf-t">¡Cita Confirmada!</h2>
    <div class="sumbox" style="width:100%">${rows}</div>`;
  const rb=mk("button","btn","Reservar otra cita");
  rb.onclick=()=>{WZ=mkWZ();if(DB.barbers.length)WZ.barber=DB.barbers[0].id;render();};
  box.appendChild(rb);
  app.appendChild(box);
}

function renderLogin(app){
  const wrap=mk("div","login-wrap fadeIn");
  const card=mk("div","login-card");
  card.innerHTML=`<div style="font-size:46px">🔑</div>`;
  card.appendChild(mk("h2","ct","Acceso Barbero"));

  const loginBtn=mk("button","btn","Entrar");
  async function doLogin(){
    showLoading();
    try{
      const res=await api("checkPass",{password:passI.value});

      else{errEl.style.display="block";passI.value="";passI.focus();}

  card.appendChild(passI);card.appendChild(errEl);card.appendChild(loginBtn);
  card.appendChild(mk("p","",`<span style="color:#333;font-size:11px">Contraseña por defecto: <b style="color:#555">maweka2024</b></span>`));
  wrap.appendChild(card);app.appendChild(wrap);
  setTimeout(()=>passI.focus(),60);

/* ── TAB CITAS ── */
function tabCitas(cont){
  cont.innerHTML="";
  const today=todayISO();
  cont.appendChild(mk("h2","sec-t","Gestión de Citas"));

  // Botón auto-confirmar
  const topRow=mk("div","flex");topRow.style.marginBottom="16px";
  ["hoy","proximas","pasadas","todas"].forEach(f=>{
    const labels={hoy:"Hoy",proximas:"Próximas",pasadas:"Pasadas",todas:"Todas"};
    const b=mk("button","fbtn"+(CITAS_FILTER===f?" on":""),labels[f]);
    b.onclick=()=>{CITAS_FILTER=f;tabCitas(cont);};
    topRow.appendChild(b);
  });
  const autoBtn=mk("button","btn-sm ml","🔄 Auto-confirmar pasadas");
  autoBtn.onclick=async()=>{
    await act("autoConfirmPast",{},"Citas pasadas confirmadas automáticamente");
    tabCitas(cont);
  };
  topRow.appendChild(autoBtn);
  cont.appendChild(topRow);

  // Filtrar
  let list=DB.appointments.filter(a=>a.status!=="eliminada");
  const now=new Date();
  if(CITAS_FILTER==="hoy")     list=list.filter(a=>normDate(a.date)===today);
  if(CITAS_FILTER==="proximas") list=list.filter(a=>!isPast(a.date,a.time));
  if(CITAS_FILTER==="pasadas")  list=list.filter(a=>isPast(a.date,a.time));
  list=list.sort((a,b)=>(normDate(a.date)+a.time).localeCompare(normDate(b.date)+b.time));

  const count=DB.appointments.filter(a=>!isPast(a.date,a.time)&&a.status==="pendiente"&&a.status!=="eliminada").length;
  const counter=mk("div","",`<span style="color:var(--muted);font-size:12px;margin-bottom:12px;display:block"><b style="color:var(--gold)">${count}</b> citas próximas pendientes</span>`);
  cont.appendChild(counter);

  if(!list.length){cont.appendChild(mk("p","empty","No hay citas en este filtro"));return;}

  const col=mk("div","col");
  list.forEach(a=>{
    const sv=DB.services.find(s=>s.id===a.svcId);
    const past=isPast(a.date,a.time);
    const ac=mk("div","apt-card");

    // Fecha
    const dd=mk("div","apt-date");
    dd.appendChild(mk("div","apt-d",fmtDate(a.date,{day:"2-digit",month:"short"})));
    dd.appendChild(mk("div","apt-t",a.time));

    // Info
    const info=mk("div","apt-info");
    const topLine=mk("div","flex");
    topLine.appendChild(mk("span","apt-name",a.name));
    topLine.innerHTML+=statusBadge(a.status);
    info.appendChild(topLine);
    info.appendChild(mk("div","apt-meta",`${sv?.name||"Servicio"} · ${a.barber}`));
    if(a.phone) info.appendChild(mk("div","apt-extra","📞 "+a.phone));
    if(a.notes) info.appendChild(mk("div","apt-extra","💬 "+a.notes));

    // Acciones
    const actions=mk("div","apt-actions");
    if(past&&a.status==="pendiente"){
      const btnA=mk("button","btn-green","✓ Asistió");
      btnA.onclick=()=>act("updateStatus",{id:a.id,status:"asistio"},"Marcado como asistido");
      const btnN=mk("button","btn-red","✗ No asistió");
      btnN.onclick=()=>act("updateStatus",{id:a.id,status:"no_asistio"},"Marcado como no asistido");
      actions.appendChild(btnA);actions.appendChild(btnN);
    }
    if(past&&(a.status==="asistio"||a.status==="no_asistio")){
      const flip=a.status==="asistio"?"no_asistio":"asistio";
      const flipLbl=a.status==="asistio"?"✗ No asistió":"✓ Asistió";
      const btnF=mk("button","btn-orange",flipLbl);
      btnF.onclick=()=>act("updateStatus",{id:a.id,status:flip},"Estado actualizado");
      actions.appendChild(btnF);
    }
    if(!past&&a.status==="pendiente"){
      const btnC=mk("button","btn-red","Cancelar");
      btnC.onclick=()=>{if(!confirm(`¿Cancelar cita de ${a.name}?`))return;act("updateStatus",{id:a.id,status:"cancelada"},"Cita cancelada");};
      actions.appendChild(btnC);
    }
    const btnD=mk("button","btn-red","🗑 Eliminar");
    btnD.onclick=()=>{if(!confirm(`¿Eliminar cita de ${a.name}? Esta acción no se puede deshacer.`))return;act("deleteAppointment",{id:a.id},"Cita eliminada");};
    actions.appendChild(btnD);
    if(actions.children.length) info.appendChild(actions);

    ac.appendChild(dd);ac.appendChild(info);
    col.appendChild(ac);
  });
  cont.appendChild(col);
}

/* ── TAB SERVICIOS ── */
let editingSvcId=null;

function tabServicios(cont){
  cont.innerHTML="";
  cont.appendChild(mk("h2","sec-t","Gestión de Servicios"));

  // Formulario añadir
  const addBox=mk("div","svc-admin-card");
  addBox.style.marginBottom="18px";
  addBox.appendChild(mk("h3","",`<span style="color:var(--text);font-size:14px;font-weight:700;margin-bottom:10px;display:block">+ Añadir Nuevo Servicio</span>`));
  const ef=mk("div","edit-form");
  ef.style.border="none";ef.style.padding="0";ef.style.background="transparent";ef.style.marginTop="0";

  const nameI=document.createElement("input");nameI.type="text";nameI.placeholder="Nombre del servicio *";
  const r3=mk("div","edit-form row3");
  const durI=document.createElement("input");durI.type="number";durI.placeholder="Duración (min)";durI.min="5";durI.step="5";durI.value="30";
  const priceI=document.createElement("input");priceI.type="number";priceI.placeholder="Precio";priceI.min="0";priceI.step="0.5";
  const curI=document.createElement("input");curI.type="text";curI.placeholder="Moneda (€, $…)";curI.value=DB.config.currency||"€";curI.style.width="80px";
  r3.appendChild(durI);r3.appendChild(priceI);r3.appendChild(curI);
  ef.appendChild(nameI);ef.appendChild(r3);

  const addBtn=mk("button","btn-sm","Añadir Servicio");
  addBtn.onclick=async()=>{
    if(!nameI.value.trim()){toast("El nombre es obligatorio",true);return;}
    await act("addService",{name:nameI.value.trim(),duration:Number(durI.value)||30,price:Number(priceI.value)||0,currency:curI.value.trim()||"€"},"Servicio añadido ✓");
    tabServicios(cont);
  };
  ef.appendChild(addBtn);
  addBox.appendChild(ef);
  cont.appendChild(addBox);

  if(!DB.services.length){cont.appendChild(mk("p","empty","No hay servicios. Añade uno arriba."));return;}

  const col=mk("div","col");
  DB.services.forEach(sv=>{
    const box=mk("div","svc-admin-card");
    const row=mk("div","svc-row");
    row.appendChild(mk("span","svc-name-big",sv.name));
    row.innerHTML+=`<span class="svc-info"><span>${sv.duration} min</span><span style="color:var(--gold)">${sv.price}${sv.currency}</span></span>`;

    const editBtn=mk("button","btn-ghost","✏️ Editar");
    editBtn.onclick=()=>{editingSvcId=(editingSvcId===sv.id?null:sv.id);tabServicios(cont);};
    const delBtn=mk("button","btn-red","🗑");
    delBtn.onclick=()=>{if(!confirm(`¿Eliminar "${sv.name}"?`))return;act("deleteService",{id:sv.id},"Servicio eliminado");};
    row.appendChild(editBtn);row.appendChild(delBtn);
    box.appendChild(row);

    if(editingSvcId===sv.id){
      const ef2=mk("div","edit-form");
      const nI=document.createElement("input");nI.type="text";nI.value=sv.name;nI.placeholder="Nombre *";
      const r=mk("div","edit-form row3");
      const dI=document.createElement("input");dI.type="number";dI.value=sv.duration;dI.min="5";dI.step="5";dI.placeholder="Min";
      const pI=document.createElement("input");pI.type="number";pI.value=sv.price;pI.min="0";pI.step="0.5";pI.placeholder="Precio";
      const cI=document.createElement("input");cI.type="text";cI.value=sv.currency;cI.placeholder="€";cI.style.width="80px";
      r.appendChild(dI);r.appendChild(pI);r.appendChild(cI);
      const saveBtn=mk("button","btn-sm","Guardar cambios");
      saveBtn.onclick=async()=>{
        if(!nI.value.trim())return;
        editingSvcId=null;
        await act("updateService",{id:sv.id,name:nI.value.trim(),duration:Number(dI.value),price:Number(pI.value),currency:cI.value.trim()||"€"},"Servicio actualizado ✓");
        tabServicios(cont);
      };
      const canBtn=mk("button","btn-ghost","Cancelar");
      canBtn.onclick=()=>{editingSvcId=null;tabServicios(cont);};
      ef2.appendChild(nI);ef2.appendChild(r);
      const btnRow=mk("div","flex");btnRow.appendChild(saveBtn);btnRow.appendChild(canBtn);
      ef2.appendChild(btnRow);
      box.appendChild(ef2);
    }
    col.appendChild(box);
  });
  cont.appendChild(col);
}

/* ── TAB BARBEROS ── */
function tabBarberos(cont){
  cont.innerHTML="";
  cont.appendChild(mk("h2","sec-t","Gestión de Barberos"));

  const addRow=mk("div","flex");addRow.style.marginBottom="20px";
  const ni=document.createElement("input");ni.type="text";ni.placeholder="Nombre del barbero *";ni.style.flex="1";
  const addBtn=mk("button","btn-sm","Añadir Barbero");
  const doAdd=async()=>{
    const n=ni.value.trim();
    if(!n){ni.focus();return;}
    if(DB.barbers.find(b=>b.name.toLowerCase()===n.toLowerCase())){toast("Ese barbero ya existe",true);return;}
    await act("addBarber",{name:n},"Barbero añadido ✓");
    tabBarberos(cont);
    ni.value="";
  };
  addBtn.onclick=doAdd;
  ni.addEventListener("keydown",e=>{if(e.key==="Enter")doAdd();});
  addRow.appendChild(ni);addRow.appendChild(addBtn);
  cont.appendChild(addRow);

  if(!DB.barbers.length){cont.appendChild(mk("p","empty","No hay barberos. Añade uno arriba."));return;}

  const col=mk("div","col");
  DB.barbers.forEach(b=>{
    const rw=mk("div","bar-row");
    rw.appendChild(mk("span","","✂️ "));
    rw.appendChild(mk("span","bar-name",b.name));
    const del=mk("button","btn-red","🗑 Eliminar");
    del.onclick=()=>{
      if(!confirm(`¿Eliminar a ${b.name}?\nSus citas existentes NO se borrarán.`))return;
      act("deleteBarber",{id:b.id},"Barbero eliminado");
    };
    rw.appendChild(del);col.appendChild(rw);
  });
  cont.appendChild(col);
}

/* ── TAB HORARIOS ── */
function tabHorarios(cont){
  if(!SCHED_DRAFT) SCHED_DRAFT=JSON.parse(JSON.stringify(DB.config));
  cont.innerHTML="";
  cont.appendChild(mk("h2","sec-t","Horario Semanal"));

  const durRow=mk("div","flex");durRow.style.marginBottom="18px";
  durRow.appendChild(mk("label","lbl","Duración del turno (minutos):"));
  const durSel=document.createElement("select");durSel.className="slim";
  [15,20,30,45,60].forEach(v=>{const o=document.createElement("option");o.value=v;o.textContent=v+" min";if(SCHED_DRAFT.slotDuration===v)o.selected=true;durSel.appendChild(o);});
  durSel.addEventListener("change",()=>SCHED_DRAFT.slotDuration=Number(durSel.value));
  durRow.appendChild(durSel);cont.appendChild(durRow);

  [1,2,3,4,5,6,0].forEach(dow=>{
    const key=String(dow);
    if(!SCHED_DRAFT.schedule[key]) SCHED_DRAFT.schedule[key]={open:false,start:"09:00",end:"20:00",breaks:[]};
    const day=SCHED_DRAFT.schedule[key];
    const row=mk("div","drow");
    const tog=mk("div","dtog");
    const track=mk("div","ttrack"+(day.open?" on":""));
    track.appendChild(mk("div","tthumb"));
    const dname=mk("span","dname",DAYS[dow]);dname.style.color=day.open?"var(--text)":"#444";
    track.onclick=()=>{day.open=!day.open;track.className="ttrack"+(day.open?" on":"");dname.style.color=day.open?"var(--text)":"#444";dcfg.style.display=day.open?"flex":"none";clbl.style.display=day.open?"none":"inline";};
    tog.appendChild(track);tog.appendChild(dname);row.appendChild(tog);

    const dcfg=mk("div","dcfg");dcfg.style.display=day.open?"flex":"none";
    const mainRow=mk("div","trow");
    const si=document.createElement("input");si.type="time";si.value=day.start;si.addEventListener("change",()=>day.start=si.value);
    const sp=mk("span","","—");sp.style.color="#555";
    const ei=document.createElement("input");ei.type="time";ei.value=day.end;ei.addEventListener("change",()=>day.end=ei.value);
    mainRow.appendChild(si);mainRow.appendChild(sp);mainRow.appendChild(ei);dcfg.appendChild(mainRow);

    const brkCont=mk("div","col");brkCont.style.marginTop="5px";
    function drawBrks(){
      brkCont.innerHTML="";
      (day.breaks||[]).forEach((b,bi)=>{
        const br=mk("div","trow");
        const lbl=mk("span","","Descanso:");lbl.style.cssText="color:var(--muted);font-size:11px;min-width:64px";
        const bs=document.createElement("input");bs.type="time";bs.value=b.start;bs.addEventListener("change",()=>b.start=bs.value);
        const sp2=mk("span","","—");sp2.style.color="#444";
        const be=document.createElement("input");be.type="time";be.value=b.end;be.addEventListener("change",()=>b.end=be.value);
        const rm=mk("button","rm","✕");rm.onclick=()=>{day.breaks.splice(bi,1);drawBrks();};
        [lbl,bs,sp2,be,rm].forEach(e=>br.appendChild(e));brkCont.appendChild(br);
      });
      const add=mk("button","add-brk","+ Descanso");
      add.onclick=()=>{if(!day.breaks)day.breaks=[];day.breaks.push({start:"13:00",end:"14:00"});drawBrks();};
      brkCont.appendChild(add);
    }
    drawBrks();dcfg.appendChild(brkCont);row.appendChild(dcfg);

    const clbl=mk("span","","Cerrado");clbl.style.cssText="color:#333;font-size:13px;margin-left:6px";clbl.style.display=day.open?"none":"inline";
    row.appendChild(clbl);cont.appendChild(row);
  });

  const saveBtn=mk("button","btn mt","Guardar Horario");
  saveBtn.onclick=async()=>{
    await act("saveSettings",{slotDuration:SCHED_DRAFT.slotDuration,schedule:SCHED_DRAFT.schedule},"Horario guardado ✓");
    SCHED_DRAFT=null;tabHorarios(cont);
  };
  cont.appendChild(saveBtn);
}

/* ── TAB FESTIVOS ── */
function tabFestivos(cont){
  cont.innerHTML="";
  cont.appendChild(mk("h2","sec-t","Días Festivos / Cierre"));

  const addRow=mk("div","flex");addRow.style.marginBottom="18px";addRow.style.flexWrap="wrap";
  const di=document.createElement("input");di.type="date";di.min=todayISO();di.style.flex="0 0 auto";
  const li=document.createElement("input");li.type="text";li.placeholder="Etiqueta (ej: Navidad)";li.style.flex="1";li.style.minWidth="120px";
  const addBtn=mk("button","btn-sm","Añadir");
  addBtn.onclick=async()=>{
    if(!di.value)return;
    const dates=[...(DB.config.closedDates||[])];
    if(dates.includes(di.value)){toast("Ese día ya está bloqueado",true);return;}
    dates.push(di.value);dates.sort();
    const labels={...(DB.config.closedLabels||{})};
    if(li.value.trim()) labels[di.value]=li.value.trim();
    await act("saveSettings",{closedDates:dates,closedLabels:labels},"Día añadido ✓");
    di.value="";li.value="";tabFestivos(cont);
  };
  [di,li,addBtn].forEach(e=>addRow.appendChild(e));
  cont.appendChild(addRow);

  if(!(DB.config.closedDates||[]).length){cont.appendChild(mk("p","empty","No hay días de cierre configurados"));return;}

  const col=mk("div","col");
  DB.config.closedDates.forEach(d=>{
    const rw=mk("div","cl-row");
    rw.appendChild(mk("span","cl-date",fmtDate(d,{weekday:"long",day:"numeric",month:"long",year:"numeric"})));
    if(DB.config.closedLabels&&DB.config.closedLabels[d]) rw.appendChild(mk("span","cl-lbl","— "+DB.config.closedLabels[d]));
    const rm=mk("button","btn-red ml","✕ Quitar");
    rm.onclick=async()=>{
      const dates=(DB.config.closedDates||[]).filter(x=>x!==d);
      const labels={...(DB.config.closedLabels||{})};delete labels[d];
      await act("saveSettings",{closedDates:dates,closedLabels:labels},"Día eliminado ✓");
      tabFestivos(cont);
    };
    rw.appendChild(rm);col.appendChild(rw);
  });
  cont.appendChild(col);
}

/* ── TAB AJUSTES ── */
function tabAjustes(cont){
  cont.innerHTML="";
  cont.appendChild(mk("h2","sec-t","Ajustes Generales"));

  // Moneda
  const sec1=mk("div","svc-admin-card");sec1.style.marginBottom="14px";
  sec1.appendChild(mk("h3","",`<span style="color:var(--text);font-size:13px;font-weight:700;margin-bottom:8px;display:block">Moneda por defecto</span>`));
  const curRow=mk("div","flex");
  const curI=document.createElement("input");curI.type="text";curI.value=DB.config.currency||"€";curI.style.width="80px";curI.placeholder="€";
  const saveCur=mk("button","btn-sm","Guardar");
  saveCur.onclick=()=>act("saveSettings",{currency:curI.value.trim()||"€"},"Moneda guardada ✓");
  curRow.appendChild(curI);curRow.appendChild(mk("span","",`<span style="color:var(--muted);font-size:12px">Símbolo que aparece en los precios (€, $, £, S/, Q…)</span>`));
  curRow.appendChild(saveCur);
  sec1.appendChild(curRow);cont.appendChild(sec1);

  // Contraseña
  const sec2=mk("div","svc-admin-card");sec2.style.marginBottom="14px";
  sec2.appendChild(mk("h3","",`<span style="color:var(--text);font-size:13px;font-weight:700;margin-bottom:8px;display:block">Cambiar contraseña del barbero</span>`));
  const passForm=mk("div","fform");passForm.style.marginBottom="10px";
  const p1=document.createElement("input");p1.type="password";p1.placeholder="Nueva contraseña";
  const p2=document.createElement("input");p2.type="password";p2.placeholder="Repetir contraseña";
  passForm.appendChild(p1);passForm.appendChild(p2);
  const savePass=mk("button","btn-sm","Cambiar contraseña");
  savePass.onclick=()=>{
    if(!p1.value){toast("Introduce la nueva contraseña",true);return;}
    if(p1.value!==p2.value){toast("Las contraseñas no coinciden",true);return;}
    if(p1.value.length<4){toast("Mínimo 4 caracteres",true);return;}
    act("saveSettings",{adminPass:p1.value},"Contraseña cambiada ✓");
    p1.value="";p2.value="";
  };
  sec2.appendChild(passForm);sec2.appendChild(savePass);cont.appendChild(sec2);

  // URL API
  const sec3=mk("div","svc-admin-card");
  sec3.appendChild(mk("h3","",`<span style="color:var(--text);font-size:13px;font-weight:700;margin-bottom:8px;display:block">URL del servidor (Apps Script)</span>`));
  const urlRow=mk("div","flex");
  const urlI=document.createElement("input");urlI.type="url";urlI.value=SCRIPT_URL;urlI.style.flex="1";urlI.style.fontSize="11px";urlI.style.fontFamily="monospace";
  const saveUrl=mk("button","btn-sm","Actualizar URL");
  saveUrl.onclick=async()=>{
    const url=urlI.value.trim();
    if(!url){toast("URL vacía",true);return;}
    SCRIPT_URL=url;localStorage.setItem(LS_URL,url);
    await loadAll();toast("URL actualizada ✓");render();
  };
  const clearUrl=mk("button","btn-red","Reconectar");
  clearUrl.onclick=()=>{if(!confirm("¿Reconectar con una URL diferente?"))return;SCRIPT_URL="";localStorage.removeItem(LS_URL);ADMIN_OK=false;render();};
  urlRow.appendChild(urlI);urlRow.appendChild(saveUrl);urlRow.appendChild(clearUrl);
  sec3.appendChild(urlRow);cont.appendChild(sec3);
}

// ══════════════════════════════════════════════
//  ARRANQUE
// ══════════════════════════════════════════════
(async()=>{
  if(SCRIPT_URL){
    showLoading();
    try{await loadAll();}
    catch(e){toast("Error al conectar: "+e.message,true);}
    finally{hideLoading();}
  }
  render();
})();
</script>
