<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>El Maweka – Barbería</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;--gold2:#a8843c;
  --bg:#0d0b08;--bg2:#111009;--bg3:#1a1510;--bg4:#252015;
  --border:#252015;--text:#e8d5a3;--muted:#666;
  --red:#e74c3c;--green:#27ae60;--orange:#e67e22;--blue:#3498db
}
body{background:var(--bg);font-family:'Lato',sans-serif;color:var(--text);min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.fadeIn{animation:fadeIn .3s ease forwards}.pop{animation:pop .25s ease forwards}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(.55)}

/* ── HEADER ── */
header{background:linear-gradient(160deg,#0f0d0a,#1c1710);border-bottom:2px solid var(--gold);
  position:sticky;top:0;z-index:300;box-shadow:0 4px 24px #00000077}
.hdr{max-width:1020px;margin:0 auto;padding:0 18px;display:flex;align-items:center;
  justify-content:space-between;height:62px;gap:8px}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.logo-icon{font-size:27px;line-height:1}
.logo-name{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold);letter-spacing:3px;display:block}
.logo-sub{font-size:9px;color:#7a6844;letter-spacing:3px;text-transform:uppercase;display:block;margin-top:-2px}
.hdr-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.nbtn{background:transparent;border:1px solid #3a2e1e;color:var(--muted);padding:6px 12px;
  border-radius:5px;cursor:pointer;font-size:12px;letter-spacing:1px;
  font-family:'Lato',sans-serif;transition:all .2s;white-space:nowrap}
.nbtn:hover{border-color:var(--gold);color:var(--gold)}
.nbtn.on{background:var(--gold);border-color:var(--gold);color:#0d0b08;font-weight:700}
.nbtn.logout{border-color:#3a2218;color:#774433}.nbtn.logout:hover{border-color:var(--red);color:var(--red)}
.refresh-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);
  width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0}
.refresh-btn:hover{border-color:var(--gold);color:var(--gold)}
.refresh-btn.spin{animation:spin .6s linear infinite}

/* ── LAYOUT ── */
main{max-width:1020px;margin:0 auto;padding:30px 18px;min-height:calc(100vh - 102px)}
footer{text-align:center;padding:14px;border-top:1px solid #1a1510;color:#383838;font-size:11px;letter-spacing:2px}

/* ── LOADING ── */
#lov{position:fixed;inset:0;background:#0d0b08e0;z-index:500;display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:12px}
#lov.on{display:flex}
.spinner{width:34px;height:34px;border:3px solid var(--bg4);border-top:3px solid var(--gold);
  border-radius:50%;animation:spin 1s linear infinite}
.loading-text{color:var(--gold);font-family:'Playfair Display',serif;font-size:14px}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#1c1a11;border:1px solid var(--gold);color:var(--text);
  padding:9px 18px;border-radius:8px;font-size:12px;z-index:600;
  opacity:0;pointer-events:none;transition:opacity .3s;max-width:300px;
  text-align:center;box-shadow:0 4px 18px #00000088}
#toast.on{opacity:1}#toast.err{border-color:var(--red);background:#1c0e0e}
#toast.ok{border-color:var(--green);background:#0a1e0e}

/* ── STEP BAR ── */
.steps{display:flex;justify-content:center;margin-bottom:24px}
.step{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;max-width:95px}
.step-n{width:27px;height:27px;border-radius:50%;border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
  color:var(--gold);transition:all .3s}
.step-n.act,.step-n.done{background:var(--gold);color:#0d0b08}
.step-l{font-size:9px;letter-spacing:1px;color:#444;text-transform:uppercase}
.step.act .step-l{color:var(--gold)}.step.done .step-l{color:#7a6844}

/* ── CARD ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  padding:26px;max-width:640px;margin:0 auto}
.ct{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);margin-bottom:16px;font-weight:700}
.back{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:12px;
  margin-bottom:11px;padding:0;font-family:'Lato',sans-serif;transition:color .2s;display:block}
.back:hover{color:var(--gold)}

/* ── CALENDAR ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-arr{background:var(--bg3);border:1px solid var(--border);color:var(--gold);
  width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.cal-arr:hover{background:var(--bg4)}
.cal-lbl{font-family:'Playfair Display',serif;font-size:15px;color:var(--text);text-transform:capitalize}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.ch{text-align:center;font-size:9px;color:#444;padding:5px 0;font-weight:700;letter-spacing:1px}
.cd{text-align:center;padding:7px 2px;border-radius:6px;font-size:12px;font-weight:700;
  cursor:default;min-height:32px;display:flex;align-items:center;justify-content:center;
  transition:all .13s;position:relative}
.cd.av{color:var(--text);border:1px solid var(--border);background:var(--bg3);cursor:pointer}
.cd.av:hover{background:var(--bg4);border-color:var(--gold);transform:scale(1.08)}
.cd.sel{background:var(--gold);color:#0d0b08;border:1px solid var(--gold)}
.cd.off{color:#1a1510;border:1px solid #0f0d0a}
.cd.cl::after{content:'🔒';font-size:7px;position:absolute;bottom:1px;right:2px}
.cal-leg{display:flex;align-items:center;gap:6px;margin-top:9px;font-size:10px;color:#444}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:2px;vertical-align:middle}

/* ── SLOTS ── */
.barber-row{margin-bottom:11px}
.barber-btns{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.bb{background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:4px 12px;
  border-radius:20px;cursor:pointer;font-size:12px;font-family:'Lato',sans-serif;transition:all .2s}
.bb:hover{border-color:var(--gold);color:var(--gold)}
.bb.on{background:var(--gold);border-color:var(--gold);color:#0d0b08;font-weight:700}
.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:5px;margin-top:4px}
.sl{padding:9px 3px;background:var(--bg3);border:1px solid var(--border);color:var(--text);
  border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;
  transition:all .13s;font-family:'Lato',sans-serif;line-height:1.3;width:100%;text-align:center}
.sl:hover:not([disabled]){background:var(--bg4);border-color:var(--gold);transform:translateY(-2px)}
.sl[disabled]{background:#0c0b08;border-color:#111;color:#252015;cursor:default}
.sl .sub{display:block;font-size:9px;font-weight:600;letter-spacing:.3px;margin-top:1px}

/* ── SERVICES ── */
.svs{display:flex;flex-direction:column;gap:7px}
.svi{background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:12px 15px;cursor:pointer;transition:all .2s}
.svi:hover,.svi.on{border-color:var(--gold);background:#1c1a11;transform:translateX(3px)}
.sv-name{font-weight:700;color:var(--text);font-size:14px}
.sv-meta{color:var(--muted);font-size:11px;margin-top:2px}
.sv-price{color:var(--gold);font-weight:700}

/* ── FORM ── */
.sumbox{background:#0d0b08;border:1px solid #1a1510;border-radius:8px;padding:11px;margin-bottom:14px}
.srow{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #111;font-size:12px}
.srow:last-child{border:none}
.slb{color:var(--muted)}.svl{color:var(--text);font-weight:600;text-align:right;max-width:60%;text-transform:capitalize}
.fform{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}

/* ── INPUTS ── */
input,textarea,select{
  background:var(--bg3);border:1px solid var(--border);color:var(--text);
  padding:8px 11px;border-radius:7px;font-size:13px;outline:none;
  width:100%;font-family:'Lato',sans-serif;transition:border-color .2s;
  -webkit-appearance:none;appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--gold)}
input::placeholder,textarea::placeholder{color:#3a3020}
input[type=password]{letter-spacing:2px}
input[type=password]::placeholder{letter-spacing:normal}
textarea{resize:vertical;height:66px}
select option{background:var(--bg3);color:var(--text)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input.err{border-color:var(--red)!important}

/* ── BUTTONS ── */
.btn{background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;color:#0d0b08;
  padding:11px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;
  width:100%;letter-spacing:1px;font-family:'Lato',sans-serif;transition:opacity .2s}
.btn:hover:not([disabled]){opacity:.85}.btn[disabled]{opacity:.32;cursor:default}
.btn-sm{background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;color:#0d0b08;
  padding:6px 13px;border-radius:6px;font-weight:700;cursor:pointer;font-size:12px;
  font-family:'Lato',sans-serif;white-space:nowrap;transition:opacity .2s}
.btn-sm:hover{opacity:.85}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);
  padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;
  font-family:'Lato',sans-serif;transition:all .2s;white-space:nowrap}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-red{background:transparent;border:1px solid #3a1818;color:#774444;padding:5px 10px;
  border-radius:6px;cursor:pointer;font-size:11px;font-family:'Lato',sans-serif;
  transition:all .2s;white-space:nowrap}
.btn-red:hover{border-color:var(--red);color:var(--red);background:#1c0808}
.btn-green{background:transparent;border:1px solid #183a1e;color:#447744;padding:5px 10px;
  border-radius:6px;cursor:pointer;font-size:11px;font-family:'Lato',sans-serif;
  transition:all .2s;white-space:nowrap}
.btn-green:hover{border-color:var(--green);color:var(--green);background:#081c0c}
.btn-orange{background:transparent;border:1px solid #3a2a10;color:#776633;padding:5px 10px;
  border-radius:6px;cursor:pointer;font-size:11px;font-family:'Lato',sans-serif;
  transition:all .2s;white-space:nowrap}
.btn-orange:hover{border-color:var(--orange);color:var(--orange)}
.btn-wa{background:#128c3e;border:none;color:#fff;padding:5px 10px;border-radius:6px;
  cursor:pointer;font-size:11px;font-family:'Lato',sans-serif;
  white-space:nowrap;display:inline-flex;align-items:center;gap:4px;transition:opacity .2s}
.btn-wa:hover{opacity:.85}
.btn-call{background:transparent;border:1px solid #1e3a5f;color:#336688;padding:5px 10px;
  border-radius:6px;cursor:pointer;font-size:11px;font-family:'Lato',sans-serif;
  transition:all .2s;white-space:nowrap}
.btn-call:hover{border-color:var(--blue);color:var(--blue)}
.btn-icon{background:transparent;border:1px solid var(--border);color:var(--muted);
  width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:12px;
  display:inline-flex;align-items:center;justify-content:center;transition:all .2s;padding:0}
.btn-icon:hover{border-color:var(--red);color:var(--red)}

/* ── CONFIRM ── */
.conf{max-width:460px;margin:0 auto;background:var(--bg2);border:1px solid var(--gold);
  border-radius:16px;padding:34px;text-align:center;display:flex;
  flex-direction:column;align-items:center;gap:13px}
.conf-t{font-family:'Playfair Display',serif;font-size:21px;color:var(--gold)}

/* ── ADMIN TABS ── */
.login-wrap{display:flex;justify-content:center;align-items:center;min-height:58vh}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  padding:32px;width:100%;max-width:340px;display:flex;flex-direction:column;gap:11px;text-align:center}
.tabs{display:flex;border-bottom:1px solid var(--border);flex-wrap:wrap;overflow-x:auto}
.tab{background:transparent;border:none;border-bottom:3px solid transparent;color:#444;
  padding:8px 12px;cursor:pointer;font-size:11px;font-weight:600;letter-spacing:.5px;
  transition:all .2s;font-family:'Lato',sans-serif;margin-bottom:-1px;white-space:nowrap}
.tab:hover{color:var(--gold)}.tab.on{color:var(--gold);border-bottom:3px solid var(--gold)}
.tcontent{background:var(--bg2);border:1px solid var(--border);border-top:none;
  border-radius:0 0 14px 14px;padding:22px}
.sec-t{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold);margin-bottom:14px;font-weight:700}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;
  font-size:10px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.badge-pend{background:#2a1e08;color:#c9843c;border:1px solid #3a2e10}
.badge-asist{background:#0a1e0e;color:#4aaa64;border:1px solid #1a3a22}
.badge-noasist{background:#1e0a0a;color:#aa4444;border:1px solid #3a1a1a}
.badge-cancel{background:#1a1a1a;color:#666;border:1px solid #333}

/* ── APT CARDS ── */
.apt-card{display:flex;gap:10px;background:#0d0b08;border:1px solid #1c1a11;
  border-radius:9px;padding:11px;align-items:flex-start;transition:border .2s}
.apt-card:hover{border-color:var(--border)}
.apt-date{text-align:center;min-width:44px}
.apt-d{color:var(--gold);font-weight:700;font-size:10px;text-transform:capitalize;line-height:1.2}
.apt-t{color:var(--text);font-weight:700;font-size:15px;font-family:'Playfair Display',serif}
.apt-info{flex:1;min-width:0}
.apt-name{color:var(--text);font-weight:700;font-size:13px}
.apt-meta{color:var(--muted);font-size:11px;margin-top:1px}
.apt-extra{color:#444;font-size:11px;margin-top:1px}
.apt-actions{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;align-items:center}

/* ── SERVICIOS ADMIN ── */
.svc-card{background:#0d0b08;border:1px solid #1c1a11;border-radius:9px;padding:12px 14px}
.svc-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.svc-name-big{font-weight:700;color:var(--text);font-size:13px;flex:1;min-width:90px}
.svc-info{color:var(--muted);font-size:11px;display:flex;gap:7px}
.edit-box{background:#0a0908;border:1px solid var(--gold);border-radius:7px;
  padding:12px;margin-top:8px;display:flex;flex-direction:column;gap:7px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}

/* ── HORARIOS ── */
.drow{display:flex;align-items:flex-start;gap:10px;padding:11px 0;
  border-bottom:1px solid #1a1510;flex-wrap:wrap}
.dtog{display:flex;align-items:center;gap:8px;min-width:135px}
.ttrack{width:38px;height:21px;border-radius:11px;position:relative;background:var(--bg4);
  cursor:pointer;transition:background .25s;flex-shrink:0}
.ttrack.on{background:var(--gold)}.tthumb{position:absolute;top:2px;left:2px;width:17px;
  height:17px;background:#fff;border-radius:50%;transition:left .25s;pointer-events:none}
.ttrack.on .tthumb{left:19px}
.dname{font-weight:600;width:80px;font-size:12px;transition:color .25s}
.dcfg{flex:1;display:flex;flex-direction:column;gap:4px}
.trow{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
input[type=time]{width:auto;padding:4px 7px;font-size:11px}
.add-brk{background:transparent;border:1px dashed var(--border);color:#444;
  padding:2px 9px;border-radius:5px;cursor:pointer;font-size:11px;
  font-family:'Lato',sans-serif;transition:all .2s;white-space:nowrap}
.add-brk:hover{border-color:var(--gold);color:var(--gold)}
.rm{background:var(--bg3);border:1px solid var(--border);color:var(--red);
  width:19px;height:19px;border-radius:50%;cursor:pointer;font-size:9px;
  display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.rm:hover{background:#1c0000}

/* ── GANANCIAS ── */
.earn-hero{background:linear-gradient(135deg,#1a1408,#252015);border:1px solid var(--gold);
  border-radius:12px;padding:18px 22px;text-align:center;margin-bottom:14px}
.earn-amt{font-family:'Playfair Display',serif;font-size:34px;color:var(--gold);font-weight:700}
.earn-lbl{color:var(--muted);font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.earn-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.earn-box{background:#0d0b08;border:1px solid #1c1a11;border-radius:9px;padding:12px}
.earn-box-t{color:var(--muted);font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
.earn-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid #111}
.earn-row:last-child{border:none}
.earn-n{color:var(--text)}.earn-v{color:var(--gold);font-weight:700}
.earn-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}

/* ── UTILS ── */
.lbl{color:#777;font-size:11px;margin-bottom:2px;display:block}
.err-msg{color:var(--red);font-size:12px;text-align:center;padding:3px}
.empty{color:#333;text-align:center;padding:28px;font-size:13px;font-style:italic}
.flex{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.col{display:flex;flex-direction:column;gap:5px}
.ml{margin-left:auto}.mt{margin-top:16px}
.slim{width:auto;padding:5px 7px;font-size:12px}
.notice{background:#1a1510;border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;color:var(--muted);font-size:12px;line-height:1.6}
.notice b{color:var(--text)}
.sep{border:none;border-top:1px solid #1a1510;margin:10px 0}
.s-sec{background:#0d0b08;border:1px solid #1c1a11;border-radius:9px;padding:13px;margin-bottom:11px}
.s-sec-t{color:var(--text);font-size:13px;font-weight:700;margin-bottom:9px;display:block}
.manual-box{background:#0d0b08;border:1px solid #252015;border-radius:9px;
  padding:14px;margin-bottom:14px;display:none}
.manual-box.open{display:block}
.cl-row{display:flex;align-items:center;gap:8px;background:#0d0b08;border:1px solid #1c1a11;
  border-radius:7px;padding:9px 12px;flex-wrap:wrap}
.cl-d{color:var(--gold);font-weight:700;font-size:12px;flex:1;text-transform:capitalize}
.cl-lbl{color:var(--muted);font-size:11px}
.bar-row{display:flex;align-items:center;gap:10px;background:#0d0b08;
  border:1px solid #1c1a11;border-radius:9px;padding:11px 14px}
.bar-name{color:var(--text);font-weight:700;flex:1;font-size:13px}

@media(max-width:540px){
  .hdr{height:auto;padding:9px 12px;flex-wrap:wrap;gap:7px}
  .card,.tcontent{padding:14px}.tab{font-size:10px;padding:7px 9px}
  .earn-grid{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="lov"><div class="spinner"></div><span class="loading-text">Cargando…</span></div>
<div id="toast"></div>

<header>
  <div class="hdr">
    <div class="logo">
      <span class="logo-icon">💈</span>
      <div>
        <span class="logo-name">EL MAWEKA</span>
        <span class="logo-sub">Barbería de Élite</span>
      </div>
    </div>
    <div class="hdr-right" id="hdr-right">
      <button class="refresh-btn" id="rbtn" title="Actualizar datos" onclick="refresh()">↻</button>
      <button class="nbtn on" id="v-client" onclick="setView('client')">Reservar</button>
      <button class="nbtn"    id="v-admin"  onclick="setView('admin')">Barbero</button>
    </div>
  </div>
</header>

<main id="app"></main>
<footer>© 2026 El Maweka — Todos los derechos reservados</footer>

<script>
"use strict";
// ══════════════════════════════════════════════════════
//  ▼▼  PON AQUÍ TU URL DE GOOGLE APPS SCRIPT  ▼▼
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUlscTh2ymVd_-ga8WhN1iY9pEr1u3e1Lz61oLpwbjK8qR9g2e0N3NEbBmiAzo8q9kPA/exec";
// ══════════════════════════════════════════════════════

const DAYS   = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

// Estado global
let DB = {appointments:[],services:[],barbers:[],
  config:{slotDuration:30,schedule:{},closedDates:[],closedLabels:{},currency:"€"}};
let VIEW="client", ADMIN_OK=false, ATAB="citas", CF="proximas";
let SCHED=null, EARN_FROM="", EARN_TO="";
let AUTO_INTERVAL=null;
let WZ = mkWZ();
function mkWZ(){ const n=new Date(); return{step:1,date:null,slot:null,svc:null,barber:null,
  name:"",phone:"",email:"",notes:"",cy:n.getFullYear(),cm:n.getMonth()}; }

// ── API (optimizada: sin showLoading para llamadas silenciosas) ──
async function api(action,payload={}){
  const qs="?action="+action+(Object.keys(payload).length?"&payload="+encodeURIComponent(JSON.stringify(payload)):"");
  const r=await fetch(SCRIPT_URL+qs,{cache:"no-store"});
  if(!r.ok) throw new Error("HTTP "+r.status);
  const j=await r.json();
  if(!j.ok) throw new Error(j.error||"Error");
  return j.data;
}

async function loadAll(){
  const d=await api("getAll");
  DB=d;
  if(!DB.config.closedLabels) DB.config.closedLabels={};
  DB.appointments=DB.appointments.map(a=>({...a,date:normDate(a.date),time:normTime(a.time)}));
}

async function act(action,payload,msg){
  showLoad();
  try{
    await api(action,payload);
    await loadAll();
    render();
    if(msg) toast(msg,"ok");
  }catch(e){ toast(e.message,"err"); }
  finally{ hideLoad(); }
}

async function refresh(){
  const btn=document.getElementById("rbtn");
  if(btn) btn.classList.add("spin");
  try{ await loadAll(); render(); toast("Actualizado","ok"); }
  catch(e){ toast(e.message,"err"); }
  finally{ setTimeout(()=>btn&&btn.classList.remove("spin"),500); }
}

// Auto-refresh cada 20s para sincronización en tiempo real
function startAutoRefresh(){
  clearInterval(AUTO_INTERVAL);
  AUTO_INTERVAL=setInterval(async()=>{
    try{ await loadAll(); render(); } catch(e){}
  },20000);
}
function stopAutoRefresh(){ clearInterval(AUTO_INTERVAL); }

// ── UI ──
function showLoad(){ document.getElementById("lov").classList.add("on"); }
function hideLoad(){ document.getElementById("lov").classList.remove("on"); }
let _tt;
function toast(msg,type=""){
  const t=document.getElementById("toast");
  t.textContent=msg; t.className="on "+(type==="err"?"err":type==="ok"?"ok":"");
  clearTimeout(_tt); _tt=setTimeout(()=>t.className="",3000);
}
function mk(tag,cls,html){
  const e=document.createElement(tag);
  if(cls) e.className=cls;
  if(html!==undefined) e.innerHTML=html;
  return e;
}
function srow(l,v){ return`<div class="srow"><span class="slb">${l}</span><span class="svl">${v||""}</span></div>`; }

// ── DATE/TIME UTILS ──
function todayISO(){ return new Date().toISOString().slice(0,10); }
function dkey(y,m,d){ return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0"); }
function toMin(t){ const[h,m]=t.split(":").map(Number); return h*60+m; }
function frMin(n){ return String(Math.floor(n/60)).padStart(2,"0")+":"+String(n%60).padStart(2,"0"); }

function normDate(ds){
  if(!ds) return "";
  const s=String(ds).trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  const dmy=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(dmy) return dmy[3]+"-"+dmy[2].padStart(2,"0")+"-"+dmy[1].padStart(2,"0");
  const d=new Date(s);
  if(!isNaN(d.getTime())&&d.getFullYear()>1900)
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  return "";
}

function normTime(t){
  if(!t) return "00:00";
  const s=String(t).trim();
  const m=s.match(/(\d{1,2}):(\d{2})/);
  return m?m[1].padStart(2,"0")+":"+m[2]:"00:00";
}

function fmtDate(ds,opts){
  const iso=normDate(ds); if(!iso||iso.length<10) return String(ds||"");
  const[y,mo,d]=iso.split("-").map(Number);
  const dt=new Date(y,mo-1,d,12,0,0);
  if(isNaN(dt.getTime())) return iso;
  return dt.toLocaleDateString("es-ES",opts||{weekday:"long",day:"numeric",month:"long"});
}

function isPast(dateStr,timeStr){
  const iso=normDate(dateStr); if(!iso||iso.length<10) return false;
  const[y,mo,d]=iso.split("-").map(Number);
  const[h,mi]=normTime(timeStr).split(":").map(Number);
  return new Date(y,mo-1,d,h,mi,0)<new Date();
}

function statusBadge(st){
  const m={pendiente:["badge-pend","⏳ Pendiente"],asistio:["badge-asist","✓ Asistió"],
    no_asistio:["badge-noasist","✗ No asistió"],cancelada:["badge-cancel","Cancelada"]};
  const[cls,lbl]=m[st]||["badge-cancel",st];
  return`<span class="badge ${cls}">${lbl}</span>`;
}

// ── SLOTS ──
function getSlots(dateStr){
  const iso=normDate(dateStr); if(!iso) return [];
  const dow=new Date(iso+"T12:00:00").getDay();
  const dc=DB.config.schedule[String(dow)];
  if(!dc||!dc.open) return [];
  if((DB.config.closedDates||[]).map(normDate).includes(iso)) return [];
  const len=DB.config.slotDuration,st=toMin(dc.start),en=toMin(dc.end);
  const out=[];
  for(let t=st;t+len<=en;t+=len){
    if(dc.breaks&&dc.breaks.some(b=>t>=toMin(b.start)&&t<toMin(b.end))) continue;
    const ts=frMin(t);
    const books=DB.appointments.filter(a=>
      normDate(a.date)===iso&&normTime(a.time)===ts&&
      a.status!=="cancelada"&&a.status!=="eliminada");
    out.push({time:ts,books,full:books.length>=DB.barbers.length});
  }
  return out;
}

function isDayOk(y,m,d){
  const dk=dkey(y,m,d);
  if(dk<todayISO()) return false;
  if(!DB.barbers.length||!DB.services.length) return false;
  // Al menos un slot disponible que no sea pasado
  return getSlots(dk).some(s=>!s.full&&!isPast(dk,s.time));
}

// ── ROUTER ──
function setView(v){
  VIEW=v;
  document.getElementById("v-client").classList.toggle("on",v==="client");
  document.getElementById("v-admin").classList.toggle("on",v==="admin");
  updateLogoutBtn();
  if(v==="client") startAutoRefresh(); else stopAutoRefresh();
  render();
}

function updateLogoutBtn(){
  const right=document.getElementById("hdr-right");
  const ex=document.getElementById("logout-btn");
  if(ADMIN_OK&&VIEW==="admin"){
    if(!ex){
      const lb=mk("button","nbtn logout","⏏ Salir");
      lb.id="logout-btn";
      lb.onclick=()=>{ ADMIN_OK=false; SCHED=null; updateLogoutBtn(); render(); };
      right.appendChild(lb);
    }
  } else if(ex) ex.remove();
}

function render(){
  document.getElementById("app").innerHTML="";
  VIEW==="client"?renderClient():renderAdmin();
}

// ══════════════════════════════════════════════════════
//  CLIENTE
// ══════════════════════════════════════════════════════
function renderClient(){
  if(!WZ.barber&&DB.barbers.length) WZ.barber=DB.barbers[0].id;
  const app=document.getElementById("app");
  const bar=mk("div","steps");
  ["Fecha","Hora","Servicio","Datos"].forEach((l,i)=>{
    const it=mk("div","step"+(WZ.step===i+1?" act":WZ.step>i+1?" done":""));
    it.appendChild(mk("div","step-n"+(WZ.step===i+1?" act":WZ.step>i+1?" done":""),WZ.step>i+1?"✓":String(i+1)));
    it.appendChild(mk("span","step-l",l));
    bar.appendChild(it);
  });
  app.appendChild(bar);
  if(WZ.step===5){ stepConfirm(app); return; }
  const card=mk("div","card fadeIn"); app.appendChild(card);
  if(!DB.barbers.length||!DB.services.length){
    card.appendChild(mk("h2","ct","Reservar Cita"));
    card.appendChild(mk("div","notice","<b>La barbería está siendo configurada.</b><br>Vuelve pronto para reservar tu cita."));
    return;
  }
  if(WZ.step===1) stepCal(card);
  if(WZ.step===2) stepSlots(card);
  if(WZ.step===3) stepSvc(card);
  if(WZ.step===4) stepForm(card);
}

function stepCal(card){
  card.appendChild(mk("h2","ct","Selecciona una Fecha"));
  const nav=mk("div","cal-nav");
  const prev=mk("button","cal-arr","‹");
  const next=mk("button","cal-arr","›");
  const lbl=mk("span","cal-lbl",MONTHS[WZ.cm]+" "+WZ.cy);
  prev.onclick=()=>{ const d=new Date(WZ.cy,WZ.cm-1,1); WZ.cy=d.getFullYear(); WZ.cm=d.getMonth(); render(); };
  next.onclick=()=>{ const d=new Date(WZ.cy,WZ.cm+1,1); WZ.cy=d.getFullYear(); WZ.cm=d.getMonth(); render(); };
  [prev,lbl,next].forEach(e=>nav.appendChild(e)); card.appendChild(nav);
  const grid=mk("div","cal-grid");
  DAYS.forEach(d=>grid.appendChild(mk("div","ch",d.slice(0,3))));
  const first=new Date(WZ.cy,WZ.cm,1).getDay();
  const total=new Date(WZ.cy,WZ.cm+1,0).getDate();
  for(let i=0;i<first;i++) grid.appendChild(mk("div",""));
  for(let d=1;d<=total;d++){
    const dk=dkey(WZ.cy,WZ.cm,d);
    const ok=isDayOk(WZ.cy,WZ.cm,d);
    const sel=dk===WZ.date;
    const cl=(DB.config.closedDates||[]).map(normDate).includes(dk);
    const el=mk("div","cd "+(sel?"sel":ok?"av":"off")+(cl?" cl":""),String(d));
    if(ok) el.onclick=()=>{ WZ.date=dk; WZ.slot=null; WZ.step=2; render(); };
    grid.appendChild(el);
  }
  card.appendChild(grid);
  const leg=mk("div","cal-leg");
  leg.innerHTML=`<span class="dot" style="background:var(--gold)"></span>Disponible&nbsp;&nbsp;<span class="dot" style="background:var(--bg3);border:1px solid var(--border)"></span>No disponible`;
  card.appendChild(leg);
}

function stepSlots(card){
  const bk=mk("button","back","← Volver"); bk.onclick=()=>{ WZ.step=1; render(); };
  card.appendChild(bk);
  card.appendChild(mk("h2","ct","Selecciona una Hora"));
  card.appendChild(mk("p","",`<span style="color:var(--muted);font-size:12px;text-transform:capitalize">${fmtDate(WZ.date)}</span>`));
  if(DB.barbers.length>1){
    const br=mk("div","barber-row"); br.appendChild(mk("label","lbl","Barbero:"));
    const btns=mk("div","barber-btns");
    DB.barbers.forEach(b=>{
      const btn=mk("button","bb"+(WZ.barber===b.id?" on":""),b.name);
      btn.onclick=()=>{ WZ.barber=b.id; card.innerHTML=""; stepSlots(card); };
      btns.appendChild(btn);
    });
    br.appendChild(btns); card.appendChild(br);
  }
  const slots=getSlots(WZ.date);
  const grid=mk("div","slots");
  if(!slots.length) grid.appendChild(mk("p","empty","No hay huecos disponibles"));
  slots.forEach(s=>{
    const barberName=DB.barbers.find(b=>b.id===WZ.barber)?.name;
    const barberFull=barberName&&s.books.some(b=>b.barber===barberName);
    const past=isPast(WZ.date,s.time); // ← bloqueo de horas pasadas
    const dis=s.full||barberFull||past;
    const btn=mk("button","sl",s.time);
    const sub=mk("span","sub",past?"Pasado":dis?"Ocupado":"Libre");
    sub.style.color=past?"#2a2010":dis?"#3a2020":"#2a5a30";
    btn.appendChild(sub);
    if(dis) btn.setAttribute("disabled","");
    else btn.onclick=()=>{ WZ.slot=s.time; WZ.step=3; render(); };
    grid.appendChild(btn);
  });
  card.appendChild(grid);
}

function stepSvc(card){
  const bk=mk("button","back","← Volver"); bk.onclick=()=>{ WZ.step=2; render(); };
  card.appendChild(bk);
  card.appendChild(mk("h2","ct","Elige tu Servicio"));
  const list=mk("div","svs");
  DB.services.forEach(sv=>{
    const it=mk("div","svi"+(WZ.svc===sv.id?" on":""));
    it.innerHTML=`<div class="sv-name">${sv.name}</div><div class="sv-meta">${sv.duration} min &nbsp;·&nbsp; <span class="sv-price">${sv.price}${sv.currency}</span></div>`;
    it.onclick=()=>{ WZ.svc=sv.id; WZ.step=4; render(); };
    list.appendChild(it);
  });
  card.appendChild(list);
}

function stepForm(card){
  const sv=DB.services.find(s=>s.id===WZ.svc);
  const barberName=DB.barbers.find(b=>b.id===WZ.barber)?.name||"";
  const bk=mk("button","back","← Volver"); bk.onclick=()=>{ WZ.step=3; render(); };
  card.appendChild(bk);
  card.appendChild(mk("h2","ct","Tus Datos"));
  const sum=mk("div","sumbox");
  sum.innerHTML=[srow("Fecha",fmtDate(WZ.date)),srow("Hora",WZ.slot),
    srow("Servicio",sv?.name),srow("Barbero",barberName)].join("");
  card.appendChild(sum);

  const form=mk("div","fform");
  const nameI=document.createElement("input"); nameI.type="text"; nameI.placeholder="Nombre completo *"; nameI.value=WZ.name; nameI.autocomplete="name";
  const phoneI=document.createElement("input"); phoneI.type="tel"; phoneI.placeholder="Teléfono * (solo números)"; phoneI.value=WZ.phone; phoneI.inputMode="numeric";
  phoneI.addEventListener("input",()=>{ phoneI.value=phoneI.value.replace(/\D/g,""); WZ.phone=phoneI.value; evalBtn(); });
  const emailI=document.createElement("input"); emailI.type="email"; emailI.placeholder="Correo electrónico * (para confirmación)"; emailI.value=WZ.email; emailI.autocomplete="email";
  const notesI=document.createElement("textarea"); notesI.placeholder="Notas (opcional)"; notesI.value=WZ.notes;
  [nameI,phoneI,emailI,notesI].forEach(e=>form.appendChild(e));
  card.appendChild(form);

  const note=mk("p","",`<span style="color:#444;font-size:11px">* Campos obligatorios. Recibirás confirmación por email.</span>`);
  card.appendChild(note);

  const confBtn=mk("button","btn","Confirmar Cita ✓");
  function validEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
  function evalBtn(){
    confBtn.disabled=!(nameI.value.trim()&&phoneI.value.trim()&&validEmail(emailI.value.trim()));
  }
  nameI.addEventListener("input",()=>{ WZ.name=nameI.value; evalBtn(); });
  emailI.addEventListener("input",()=>{ WZ.email=emailI.value; evalBtn(); });
  notesI.addEventListener("input",()=>{ WZ.notes=notesI.value; });
  evalBtn();

  confBtn.onclick=async()=>{
    WZ.name=nameI.value.trim(); WZ.phone=phoneI.value.trim();
    WZ.email=emailI.value.trim(); WZ.notes=notesI.value.trim();
    if(confBtn.disabled) return;
    showLoad();
    try{
      // Verificar disponibilidad en tiempo real (sin mostrar el spinner si ya pasó)
      await loadAll();
      const fSlots=getSlots(WZ.date);
      const fSlot=fSlots.find(s=>s.time===WZ.slot);
      const bBooked=fSlot&&fSlot.books.some(b=>b.barber===barberName);
      if(!fSlot||fSlot.full||bBooked||isPast(WZ.date,WZ.slot)){
        hideLoad(); toast("Este hueco ya no está disponible","err");
        WZ.slot=null; WZ.step=2; render(); return;
      }
      await api("addAppointment",{
        date:WZ.date,time:WZ.slot,barber:barberName,
        svcId:WZ.svc,svcName:sv?.name,duration:sv?.duration,
        name:WZ.name,phone:WZ.phone,email:WZ.email,notes:WZ.notes
      });
      await loadAll();
      WZ.step=5; render();
    }catch(e){ toast(e.message,"err"); }
    finally{ hideLoad(); }
  };
  card.appendChild(confBtn);
}

function stepConfirm(app){
  const sv=DB.services.find(s=>s.id===WZ.svc);
  const barberName=DB.barbers.find(b=>b.id===WZ.barber)?.name||"";
  const box=mk("div","conf pop");
  box.innerHTML=`<div style="font-size:54px">✅</div>
    <h2 class="conf-t">¡Cita Confirmada!</h2>
    <div class="sumbox" style="width:100%">
      ${[srow("Nombre",WZ.name),
         srow("Fecha",fmtDate(WZ.date,{weekday:"long",day:"numeric",month:"long",year:"numeric"})),
         srow("Hora",WZ.slot),srow("Servicio",sv?.name),srow("Barbero",barberName),
         srow("Teléfono",WZ.phone),srow("Email",WZ.email)].join("")}
    </div>
    <p style="color:var(--muted);font-size:11px">📧 Confirmación enviada a ${WZ.email}</p>`;
  // WhatsApp al barbero
  if(WZ.phone){
    const waMsg=encodeURIComponent(`Hola ${WZ.name}! Tu cita en El Maweka ha sido confirmada:\n📅 ${fmtDate(WZ.date)}\n🕐 ${WZ.slot}\n✂️ ${sv?.name||""}\n¡Te esperamos!`);
    const waBtn=mk("button","btn-wa","📱 Abrir WhatsApp");
    waBtn.onclick=()=>window.open(`https://wa.me/${WZ.phone.replace(/\D/g,"")}?text=${waMsg}`,"_blank");
    box.appendChild(waBtn);
  }
  const rb=mk("button","btn-ghost","Reservar otra cita"); rb.style.marginTop="2px";
  rb.onclick=()=>{ WZ=mkWZ(); if(DB.barbers.length) WZ.barber=DB.barbers[0].id; render(); };
  box.appendChild(rb); app.appendChild(box);
}

// ══════════════════════════════════════════════════════
//  ADMIN
// ══════════════════════════════════════════════════════
function renderAdmin(){
  const app=document.getElementById("app");
  if(!ADMIN_OK){ renderLogin(app); return; }
  const tabs=mk("div","tabs");
  [["citas","📋 Citas"],["ganancias","💰 Ganancias"],["servicios","✂️ Servicios"],
   ["barberos","👤 Barberos"],["horarios","🕐 Horarios"],["festivos","🗓 Festivos"],
   ["ajustes","⚙️ Ajustes"]].forEach(([id,lbl])=>{
    const t=mk("button","tab"+(ATAB===id?" on":""),lbl);
    t.onclick=()=>{ ATAB=id; SCHED=null; render(); }; tabs.appendChild(t);
  });
  app.appendChild(tabs);
  const cont=mk("div","tcontent fadeIn"); app.appendChild(cont);
  if(ATAB==="citas")     tabCitas(cont);
  if(ATAB==="ganancias") tabGanancias(cont);
  if(ATAB==="servicios") tabServicios(cont);
  if(ATAB==="barberos")  tabBarberos(cont);
  if(ATAB==="horarios")  tabHorarios(cont);
  if(ATAB==="festivos")  tabFestivos(cont);
  if(ATAB==="ajustes")   tabAjustes(cont);
}

function renderLogin(app){
  const wrap=mk("div","login-wrap fadeIn");
  const card=mk("div","login-card");
  card.innerHTML=`<div style="font-size:42px">🔑</div>`;
  card.appendChild(mk("h2","ct","Acceso Barbero"));
  const passI=document.createElement("input"); passI.type="password"; passI.placeholder="Contraseña";
  const errEl=mk("p","err-msg","Contraseña incorrecta"); errEl.style.display="none";
  const btn=mk("button","btn","Entrar");
  async function doLogin(){
    showLoad();
    try{
      const r=await api("checkPass",{password:passI.value});
      if(r.valid){ ADMIN_OK=true; updateLogoutBtn(); render(); }
      else{ errEl.style.display="block"; passI.value=""; passI.focus(); }
    }catch(e){ toast(e.message,"err"); }
    finally{ hideLoad(); }
  }
  btn.onclick=doLogin;
  passI.addEventListener("keydown",e=>{ if(e.key==="Enter") doLogin(); });
  card.appendChild(passI); card.appendChild(errEl); card.appendChild(btn);
  card.appendChild(mk("p","",`<span style="color:#333;font-size:11px">Por defecto: <b style="color:#555">maweka2024</b></span>`));
  wrap.appendChild(card); app.appendChild(wrap);
  setTimeout(()=>passI.focus(),60);
}

// ── TAB CITAS ──
function tabCitas(cont){
  cont.innerHTML="";
  const today=todayISO();
  cont.appendChild(mk("h2","sec-t","Gestión de Citas"));

  // Toggle cita manual
  const toggleManual=mk("button","btn-sm","+ Cita manual");
  const manualBox=mk("div","manual-box");
  toggleManual.onclick=()=>manualBox.classList.toggle("open");

  // Formulario manual
  const mTitle=mk("p","",`<span style="color:var(--gold);font-size:13px;font-weight:700;margin-bottom:9px;display:block">Nueva cita manual</span>`);
  manualBox.appendChild(mTitle);
  const mg2=mk("div","g2"); mg2.style.marginBottom="7px";
  const mg3=mk("div","g3"); mg3.style.marginBottom="7px";
  function inp(ph,type="text"){ const i=document.createElement("input"); i.type=type; i.placeholder=ph; return i; }
  const mName=inp("Nombre *"); const mPhone=inp("Teléfono *","tel");
  const mEmail=inp("Email","email"); const mDate=inp("Fecha","date"); mDate.min=today;
  const mTime=inp("Hora","time");
  const mBarber=document.createElement("select");
  mBarber.appendChild(Object.assign(document.createElement("option"),{value:"",textContent:"Barbero..."}));
  DB.barbers.forEach(b=>{ const o=document.createElement("option"); o.value=b.name; o.textContent=b.name; mBarber.appendChild(o); });
  const mSvc=document.createElement("select");
  mSvc.appendChild(Object.assign(document.createElement("option"),{value:"",textContent:"Servicio..."}));
  DB.services.forEach(s=>{ const o=document.createElement("option"); o.value=s.id; o.textContent=`${s.name} (${s.duration}min)`; mSvc.appendChild(o); });
  const mNotes=document.createElement("textarea"); mNotes.placeholder="Notas"; mNotes.style.height="45px";
  [mName,mPhone].forEach(e=>mg2.appendChild(e));

  cont.appendChild(toggleManual); cont.appendChild(manualBox);
  cont.appendChild(mk("hr","sep","")); cont.appendChild(topRow); cont.appendChild(expBtn);

  let list=DB.appointments.filter(a=>a.status!=="eliminada");
  if(CF==="hoy")      list=list.filter(a=>normDate(a.date)===today);
  if(CF==="proximas") list=list.filter(a=>!isPast(a.date,a.time));
  if(CF==="pasadas")  list=list.filter(a=>isPast(a.date,a.time));
  list=list.sort((a,b)=>(normDate(a.date)+normTime(a.time)).localeCompare(normDate(b.date)+normTime(b.time)));

  const cnt=DB.appointments.filter(a=>!isPast(a.date,a.time)&&a.status==="pendiente").length;
  cont.appendChild(mk("p","",`<span style="color:var(--muted);font-size:12px;margin-bottom:8px;display:block"><b style="color:var(--gold)">${cnt}</b> próximas pendientes</span>`));

  if(!list.length){ cont.appendChild(mk("p","empty","Sin citas en este filtro")); return; }

  const col=mk("div","col");
  list.forEach(a=>{
    const sv=DB.services.find(s=>s.id===a.svcId);
    const past=isPast(a.date,a.time);
    const ac=mk("div","apt-card");
    const dd=mk("div","apt-date");
    dd.appendChild(mk("div","apt-d",fmtDate(a.date,{day:"2-digit",month:"short"})));
    dd.appendChild(mk("div","apt-t",normTime(a.time)));
    const info=mk("div","apt-info");
    const tl=mk("div","flex");
    tl.appendChild(mk("span","apt-name",a.name));
    tl.innerHTML+=statusBadge(a.status);
    info.appendChild(tl);
    info.appendChild(mk("div","apt-meta",(sv?.name||a.svcId)+" · "+a.barber));
    if(a.phone) info.appendChild(mk("div","apt-extra","📞 "+a.phone));
    if(a.email) info.appendChild(mk("div","apt-extra","📧 "+a.email));
    if(a.notes) info.appendChild(mk("div","apt-extra","💬 "+a.notes));

    const acts=mk("div","apt-actions");
    // WhatsApp + llamar
    if(a.phone){
      const waMsg=encodeURIComponent(`Hola ${a.name}, te confirmamos tu cita para el ${fmtDate(a.date)} a las ${normTime(a.time)} en El Maweka. ¡Te esperamos!`);
      const waB=mk("button","btn-wa","📱 WhatsApp");
      waB.onclick=()=>window.open(`https://wa.me/${a.phone.replace(/\D/g,"")}?text=${waMsg}`,"_blank");
      const callB=mk("button","btn-call","📞 Llamar");
      callB.onclick=()=>window.open(`tel:${a.phone}`);
      acts.appendChild(waB); acts.appendChild(callB);
    }
    if(past&&a.status==="pendiente"){
      const bA=mk("button","btn-green","✓ Asistió"); bA.onclick=()=>act("updateStatus",{id:a.id,status:"asistio"},"✓ Actualizado");
      const bN=mk("button","btn-red","✗ No asistió"); bN.onclick=()=>act("updateStatus",{id:a.id,status:"no_asistio"},"Actualizado");
      acts.appendChild(bA); acts.appendChild(bN);
    }
    if(past&&(a.status==="asistio"||a.status==="no_asistio")){
      const flip=a.status==="asistio"?"no_asistio":"asistio";
      const bF=mk("button","btn-orange",a.status==="asistio"?"✗ No asistió":"✓ Asistió");
      bF.onclick=()=>act("updateStatus",{id:a.id,status:flip},"Actualizado");
      acts.appendChild(bF);
    }
    if(!past&&a.status==="pendiente"){
      const bC=mk("button","btn-red","Cancelar");
      bC.onclick=()=>{ if(!confirm(`¿Cancelar cita de ${a.name}?`)) return; act("updateStatus",{id:a.id,status:"cancelada"},"Cancelada"); };
      acts.appendChild(bC);
    }
    const bD=mk("button","btn-icon","🗑"); bD.title="Eliminar";
    bD.onclick=()=>{ if(!confirm(`¿Eliminar cita de ${a.name}?`)) return; act("deleteAppointment",{id:a.id},"Eliminada"); };
    acts.appendChild(bD);
    if(acts.children.length) info.appendChild(acts);
    ac.appendChild(dd); ac.appendChild(info); col.appendChild(ac);
  });
  cont.appendChild(col);
}

function exportCSV(){
  const today=todayISO();
  let list=DB.appointments.filter(a=>a.status!=="eliminada");
  if(CF==="hoy")      list=list.filter(a=>normDate(a.date)===today);
  if(CF==="proximas") list=list.filter(a=>!isPast(a.date,a.time));
  if(CF==="pasadas")  list=list.filter(a=>isPast(a.date,a.time));
  list=list.sort((a,b)=>(normDate(a.date)+a.time).localeCompare(normDate(b.date)+b.time));
  const head="Fecha,Hora,Nombre,Teléfono,Email,Servicio,Barbero,Estado,Notas";
  const rows=list.map(a=>{
    const sv=DB.services.find(s=>s.id===a.svcId);
    return [a.date,normTime(a.time),a.name,a.phone,a.email,sv?.name||a.svcId,a.barber,a.status,a.notes||""]
      .map(v=>'"'+String(v||"").replace(/"/g,'""')+'"').join(",");
  });
  const csv="\uFEFF"+head+"\n"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="citas_"+today+".csv"; a.click();
  URL.revokeObjectURL(url); toast("CSV descargado","ok");
}

async function loadEarnings(cont){
  const ph=cont.querySelector("#earn-ph"); if(!ph) return;
  ph.innerHTML=`<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">Calculando…</div>`;
  try{
    const data=await api("getEarnings",{from:EARN_FROM,to:EARN_TO});
    renderEarnings(ph,data);
  }catch(e){ ph.innerHTML=`<p class="empty">Error: ${e.message}</p>`; }

function renderEarnings(el,data){
  el.innerHTML=""; const cur=DB.config.currency||"€";
  const hero=mk("div","earn-hero");
  hero.innerHTML=`<div class="earn-amt">${data.total.toFixed(2)}${cur}</div><div class="earn-lbl">Total confirmado</div>`;
  el.appendChild(hero);
  const grid=mk("div","earn-grid");
  function makeBoxSvc(title,obj){
    // Like makeBox but resolves svcId → name via DB.services
    const box=mk("div","earn-box"); box.appendChild(mk("div","earn-box-t",title));
    const entries=Object.entries(obj);
    if(!entries.length){ box.appendChild(mk("p","empty","Sin datos")); return box; }
    entries.forEach(([k,v])=>{
      const sv=DB.services.find(s=>s.id===k);
      const r=mk("div","earn-row");
      r.appendChild(mk("span","earn-n",sv?.name||k));
      r.appendChild(mk("span","earn-v",Number(v).toFixed(2)+cur));
      box.appendChild(r);
    });
    return box;
  }
  function makeBox(title,obj){
    const box=mk("div","earn-box"); box.appendChild(mk("div","earn-box-t",title));
    const entries=Object.entries(obj);
    if(!entries.length){ box.appendChild(mk("p","empty","Sin datos")); return box; }
    entries.forEach(([k,v])=>{
      const sv=DB.services.find(s=>s.id===k);
      const r=mk("div","earn-row");
      r.appendChild(mk("span","earn-n",sv?.name||k));
      r.appendChild(mk("span","earn-v",v.toFixed(2)+cur));
      box.appendChild(r);
    });
    return box;
  }
  grid.appendChild(makeBoxSvc("Por servicio",data.byService));
  grid.appendChild(makeBox("Por barbero",data.byBarber));
  el.appendChild(grid);
  if(data.list.length){
    const expB=mk("button","btn-ghost","📥 Exportar CSV"); expB.style.marginBottom="9px";
    expB.onclick=()=>exportEarningsCSV(data.list);
    el.appendChild(expB);
    const col=mk("div","col");
    data.list.sort((a,b)=>a.date.localeCompare(b.date)).forEach(a=>{
      const r=mk("div","apt-card");
      r.innerHTML=`
        <div class="apt-date">
          <div class="apt-d">${fmtDate(a.date,{day:"2-digit",month:"short"})}</div>
          <div class="apt-t">${a.time}</div>
        </div>
        <div class="apt-info">
          <div class="apt-name">${a.name}</div>
          <div class="apt-meta">${a.svc} · ${a.barber}</div>
        </div>
        <div style="color:var(--gold);font-weight:700;font-size:15px;align-self:center;margin-left:auto">${a.price.toFixed(2)}${a.currency}</div>`;
      col.appendChild(r);
    });
    el.appendChild(col);
  }
}

function tabHorarios(cont){
  if(!SCHED) SCHED=JSON.parse(JSON.stringify(DB.config));
  cont.innerHTML="";
  cont.appendChild(mk("h2","sec-t","Horario Semanal"));
  const durRow=mk("div","flex"); durRow.style.marginBottom="14px";
  durRow.appendChild(mk("label","lbl","Duración del turno:"));
  const durSel=document.createElement("select"); durSel.className="slim";
  [15,20,30,45,60].forEach(v=>{ const o=document.createElement("option"); o.value=v; o.textContent=v+" min"; if(SCHED.slotDuration===v) o.selected=true; durSel.appendChild(o); });
  durSel.addEventListener("change",()=>SCHED.slotDuration=Number(durSel.value));
  durRow.appendChild(durSel); cont.appendChild(durRow);
  [1,2,3,4,5,6,0].forEach(dow=>{
    const key=String(dow);
    if(!SCHED.schedule[key]) SCHED.schedule[key]={open:false,start:"09:00",end:"20:00",breaks:[]};
    const day=SCHED.schedule[key];
    const row=mk("div","drow");
    const tog=mk("div","dtog");
    const track=mk("div","ttrack"+(day.open?" on":""));
    track.appendChild(mk("div","tthumb"));
    const dname=mk("span","dname",DAYS[dow]); dname.style.color=day.open?"var(--text)":"#444";
    track.onclick=()=>{ day.open=!day.open; track.className="ttrack"+(day.open?" on":""); dname.style.color=day.open?"var(--text)":"#444"; dcfg.style.display=day.open?"flex":"none"; clbl.style.display=day.open?"none":"inline"; };
    tog.appendChild(track); tog.appendChild(dname); row.appendChild(tog);
    const dcfg=mk("div","dcfg"); dcfg.style.display=day.open?"flex":"none";
    const mr=mk("div","trow");
    const si=document.createElement("input"); si.type="time"; si.value=day.start; si.addEventListener("change",()=>day.start=si.value);
    const sp=mk("span","","—"); sp.style.color="#555";
    const ei=document.createElement("input"); ei.type="time"; ei.value=day.end; ei.addEventListener("change",()=>day.end=ei.value);
    mr.appendChild(si); mr.appendChild(sp); mr.appendChild(ei); dcfg.appendChild(mr);
    const brkC=mk("div","col"); brkC.style.marginTop="4px";
    function drawBrks(){
      brkC.innerHTML="";
      (day.breaks||[]).forEach((b,bi)=>{
        const br=mk("div","trow");
        const lbl=mk("span","","Descanso:"); lbl.style.cssText="color:var(--muted);font-size:10px;min-width:58px";
        const bs=document.createElement("input"); bs.type="time"; bs.value=b.start; bs.addEventListener("change",()=>b.start=bs.value);
        const sp2=mk("span","","—"); sp2.style.color="#444";
        const be=document.createElement("input"); be.type="time"; be.value=b.end; be.addEventListener("change",()=>b.end=be.value);
        const rm=mk("button","rm","✕"); rm.onclick=()=>{ day.breaks.splice(bi,1); drawBrks(); };
        [lbl,bs,sp2,be,rm].forEach(e=>br.appendChild(e)); brkC.appendChild(br);
      });
      const add=mk("button","add-brk","+ Descanso");
      add.onclick=()=>{ if(!day.breaks) day.breaks=[]; day.breaks.push({start:"13:00",end:"14:00"}); drawBrks(); };
      brkC.appendChild(add);
    }
    drawBrks(); dcfg.appendChild(brkC); row.appendChild(dcfg);
    const clbl=mk("span","","Cerrado"); clbl.style.cssText="color:#333;font-size:12px;margin-left:6px"; clbl.style.display=day.open?"none":"inline";
    row.appendChild(clbl); cont.appendChild(row);
  });
  const saveBtn=mk("button","btn mt","Guardar Horario");
  saveBtn.onclick=async()=>{ await act("saveSettings",{slotDuration:SCHED.slotDuration,schedule:SCHED.schedule},"Guardado ✓"); SCHED=null; tabHorarios(cont); };
  cont.appendChild(saveBtn);
}

    const rm=mk("button","btn-red ml","✕");
    rm.onclick=async()=>{
      const dates=(DB.config.closedDates||[]).filter(x=>x!==d);
      const labels={...DB.config.closedLabels}; delete labels[d];
      await act("saveSettings",{closedDates:dates,closedLabels:labels},"Eliminado ✓");
    };
    rw.appendChild(rm); col.appendChild(rw);
  });
  cont.appendChild(col);
}

// ── TAB AJUSTES ──
function tabAjustes(cont){
  cont.innerHTML="";
  cont.appendChild(mk("h2","sec-t","Ajustes"));

  // Moneda
  const s1=mk("div","s-sec"); s1.appendChild(mk("span","s-sec-t","Moneda"));
  const cRow=mk("div","flex");
  const curI=document.createElement("input"); curI.type="text"; curI.value=DB.config.currency||"€"; curI.style.width="65px";
  const sC=mk("button","btn-sm","Guardar"); sC.onclick=()=>act("saveSettings",{currency:curI.value.trim()||"€"},"Guardado ✓");
  cRow.appendChild(curI); cRow.appendChild(mk("span","",`<span style="color:var(--muted);font-size:11px">€, $, £, S/…</span>`)); cRow.appendChild(sC);
  s1.appendChild(cRow); cont.appendChild(s1);

  // Contraseña
  const s2=mk("div","s-sec"); s2.appendChild(mk("span","s-sec-t","Cambiar contraseña"));
  const p1=document.createElement("input"); p1.type="password"; p1.placeholder="Nueva contraseña";
  const p2=document.createElement("input"); p2.type="password"; p2.placeholder="Repetir contraseña";
  const sP=mk("button","btn-sm","Cambiar");
  sP.onclick=()=>{
    if(!p1.value||p1.value!==p2.value){ toast("No coinciden","err"); return; }
    if(p1.value.length<4){ toast("Mínimo 4 caracteres","err"); return; }
    act("saveSettings",{adminPass:p1.value},"Cambiada ✓"); p1.value=""; p2.value="";
  };
  [p1,p2,sP].forEach(e=>s2.appendChild(e)); cont.appendChild(s2);
}

// ── INIT ──
(async()=>{
  showLoad();
  try{ await loadAll(); }
  catch(e){ toast("Error al conectar: "+e.message,"err"); }
  finally{ hideLoad(); render(); startAutoRefresh(); }
})();
</script>
</body>
</html>
